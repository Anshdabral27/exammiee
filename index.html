                    ${availableTests.length === 0 && completedTests.length > 0 ? `<div class="p-4 text-muted col-span-full">No new tests currently available.</div>` : ''}
                </div>

                <h2 class="text-2xl font-bold mb-4 flex items-center"><i class="fas fa-award mr-2 text-accent-1"></i> Completed Tests (${completedTests.length})</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${completedTests.map(t => {
                const result = results[t.id];
                const showMarks = t.show_marks !== false;
                const offenseColor = result.fullScreenOffenses > 0 ? 'text-red-400 font-bold' : 'text-green-400';
                return `
                            <div class="card p-6 border-accent-1/50">
                                <h3 class="text-xl font-bold text-white mb-2">${escapeHtml(t.title)}</h3>
                                <p class="text-muted text-sm mb-3">Completed: ${new Date(result.completionTime).toLocaleString()}</p>
                                ${showMarks ? `
                                    <p class="text-white text-lg font-bold">Score: <span class="text-accent-2">${result.score} / ${result.maxScore}</span></p>
                                    <p class="text-sm ${offenseColor}">Proctoring Offenses: ${result.fullScreenOffenses || 0}</p>
                                ` : `
                                    <p class="text-accent-1 font-semibold italic"><i class="fas fa-lock mr-1"></i> Marks hidden by teacher</p>
                                `}
                                
                                ${result.snapshots && result.snapshots.length > 0 ? `
                                    <p class="text-xs mt-2 text-yellow-500 italic">Snapshots recorded for integrity review.</p>
                                ` : ''}
                            </div>
                        `;
            }).join('')}
                    ${completedTests.length === 0 && availableTests.length > 0 ? `<div class="p-4 text-muted col-span-full">You have not completed any tests yet.</div>` : ''}
                </div>
            </div>
        `;
        }

        function renderStudentProfile() {
            if (!state.currentUser || state.currentUser.role !== 'student') return renderError('Access Denied');
            const student = DB.students[state.currentUser.id];
            if (!student) return renderError('Student Data Not Found');

            const studentNav = `
            <button onclick="setState(APP_STATE.STUDENT_DASHBOARD)" class="text-white p-2 rounded-lg hover:bg-glass transition" title="Go to Dashboard">
                <i class="fas fa-home text-xl"></i>
            </button>
        `;

            return `
            <div class="fade-in">
                ${renderHeader('My Profile', studentNav)}
                <div class="card p-8 max-w-lg mx-auto">
                    <h2 class="text-2xl font-bold mb-6 text-accent-2 border-b border-glass pb-2">Update Account Details</h2>
                    <form onsubmit="handleProfileUpdate(event)" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-1 text-white" for="profileId">Student ID (Username)</label>
                            <input id="profileId" type="text" disabled class="input-field w-full cursor-not-allowed" value="${escapeHtml(state.currentUser.id)}">
                            <p class="text-xs text-muted mt-1">Your ID cannot be changed.</p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1 text-white" for="profileName">Full Name</label>
                            <input id="profileName" name="profileName" type="text" required class="input-field w-full" value="${escapeHtml(student.name)}">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1 text-white" for="profilePass">New Password (Leave blank to keep current)</label>
                            <input id="profilePass" name="profilePass" type="password" class="input-field w-full" placeholder="Enter new password">
                            <p class="text-xs text-muted mt-1">Minimum 6 characters recommended.</p>
                        </div>
                        <button type="submit" class="btn-primary w-full bg-accent-2 hover:bg-accent-1">
                            <i class="fas fa-save mr-2"></i> Save Changes
                        </button>
                    </form>
                </div>
                <div class="text-center mt-6">
                    <button onclick="handleLogout()" class="text-muted hover:text-red-400 transition text-sm">Sign Out of All Sessions</button>
                </div>
            </div>
        `;
        }


        function renderAdminStats() {
            const stats = state.calculatedStats || {};

            // Dynamic colors based on potential risks/activity
            const offenseColor = stats.totalOffenses > 0 ? 'text-red-400' : 'text-green-400';
            const offenseBorder = stats.totalOffenses > 0 ? 'border-red-400/50' : 'border-glass';

            return `
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 mb-6">
                <div class="card p-4 text-center border-accent-2/50">
                    <i class="fas fa-users text-3xl text-accent-2 mb-2"></i>
                    <p class="text-white font-bold text-2xl">${stats.totalStudents || 0}</p>
                    <p class="text-muted text-sm">Total Students</p>
                </div>
                <div class="card p-4 text-center border-accent-1/50">
                    <i class="fas fa-flask text-3xl text-accent-1 mb-2"></i>
                    <p class="text-white font-bold text-2xl">${stats.totalTests || 0}</p>
                    <p class="text-muted text-sm">Total Tests</p>
                </div>
                 <div class="card p-4 text-center border-green-500/50">
                    <i class="fas fa-clipboard-check text-3xl text-green-400 mb-2"></i>
                    <p class="text-white font-bold text-2xl">${stats.completedExams || 0}</p>
                    <p class="text-muted text-sm">Completed Exams</p>
                </div>
                <div class="card p-4 text-center border-yellow-500/50">
                    <i class="fas fa-tasks text-3xl text-yellow-400 mb-2"></i>
                    <p class="text-white font-bold text-2xl">${stats.totalAssignments || 0}</p>
                    <p class="text-muted text-sm">Total Assignments</p>
                </div>
                <div class="card p-4 text-center ${offenseBorder}">
                    <i class="fas fa-exclamation-triangle text-3xl ${offenseColor} mb-2"></i>
                    <p class="text-white font-bold text-2xl">${stats.totalOffenses || 0}</p>
                    <p class="text-muted text-sm">Proctoring Offenses</p>
                </div>
            </div>
        `;
        }


        function renderAdminDashboard() {
            const navHtml = `
            <div class="hidden md:flex space-x-2">
                <button onclick="setState(APP_STATE.ADMIN_MANAGE_STUDENTS)" class="text-white p-2 rounded-lg hover:bg-glass transition" title="Manage Students">
                    <i class="fas fa-users text-xl"></i>
                </button>
                <button onclick="setState(APP_STATE.ADMIN_MANAGE_TESTS)" class="text-white p-2 rounded-lg hover:bg-glass transition" title="Manage Tests">
                    <i class="fas fa-flask text-xl"></i>
                </button>
                <button onclick="setState(APP_STATE.ADMIN_MANAGE_ASSIGNMENTS)" class="text-white p-2 rounded-lg hover:bg-glass transition" title="Assign Tests">
                    <i class="fas fa-tasks text-xl"></i>
                </button>
                 <button onclick="setState(APP_STATE.ADMIN_VIEW_RESULTS)" class="text-white p-2 rounded-lg hover:bg-glass transition" title="View Results">
                    <i class="fas fa-award text-xl"></i>
                </button>
            </div>
        `;

            const mobileNavHtml = `
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mt-4">
                <button onclick="setState(APP_STATE.ADMIN_MANAGE_STUDENTS)" class="btn-primary py-3 px-4 flex flex-col items-center justify-center h-20">
                    <i class="fas fa-users text-2xl"></i>
                    <span class="text-sm mt-1">Students</span>
                </button>
                <button onclick="setState(APP_STATE.ADMIN_MANAGE_TESTS)" class="btn-primary py-3 px-4 flex flex-col items-center justify-center h-20">
                    <i class="fas fa-flask text-2xl"></i>
                    <span class="text-sm mt-1">Tests</span>
                </button>
                <button onclick="setState(APP_STATE.ADMIN_MANAGE_ASSIGNMENTS)" class="btn-primary py-3 px-4 flex flex-col items-center justify-center h-20">
                    <i class="fas fa-tasks text-2xl"></i>
                    <span class="text-sm mt-1">Assign</span>
                </button>
                <button onclick="setState(APP_STATE.ADMIN_VIEW_RESULTS)" class="btn-primary py-3 px-4 flex flex-col items-center justify-center h-20">
                    <i class="fas fa-award text-2xl"></i>
                    <span class="text-sm mt-1">Results</span>
                </button>
            </div>
        `;

            return `
            <div class="fade-in">
                ${renderHeader('Admin Panel', navHtml)}
                 ${renderAdminStats()}




                
                <h2 class="text-2xl font-bold mb-4 text-accent-1 border-b border-glass pb-2 hidden md:block">Navigation</h2>

                <div class="md:hidden">
                    <h2 class="text-2xl font-bold mb-4 text-accent-1 border-b border-glass pb-2">Navigation</h2>
                    ${mobileNavHtml}
                </div>
                
                <div class="mt-8">
                    ${renderAdminContent()}
                </div>
            </div>
        `;
        }

        // Renders the specific admin view based on state
        function renderAdminContent() {
            switch (state.appState) {
                case APP_STATE.ADMIN_MANAGE_TESTS:
                    return renderManageTests();
                case APP_STATE.ADMIN_MANAGE_STUDENTS:
                    return renderManageStudents();
                case APP_STATE.ADMIN_MANAGE_ASSIGNMENTS:
                    return renderManageAssignments();
                case APP_STATE.ADMIN_VIEW_RESULTS:
                    return renderViewResults();
                case APP_STATE.ADMIN_DASHBOARD:
                    // Default content area on dashboard, perhaps an activity log or latest results?
                    return `
                    <h2 class="text-2xl font-bold mb-4 text-accent-2">Latest Activity Summary</h2>
                    <div class="card p-6 space-y-3">
                        <p class="text-white font-semibold">Welcome to the Exammiee Admin Panel!</p>
                        <p class="text-muted">Use the navigation links above or the buttons to manage tests, students, and review results.</p>
                        <ul class="list-disc list-inside text-sm text-muted">
                            <li>Total Students: ${state.calculatedStats.totalStudents}</li>
                            <li>Total Tests: ${state.calculatedStats.totalTests}</li>
                            <li>Completed Exams: ${state.calculatedStats.completedExams}</li>
                        </ul>
                    </div>
                `;
                default:
                    return '';
            }
        }


        function renderManageTests() {
            if (state.editTestId) {
                return renderEditTest();
            }

            const testList = DB.tests;

            return `
            <div class="card p-6">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 border-b border-glass pb-2">
                    <h3 class="text-xl font-bold text-accent-2 mb-2 sm:mb-0"><i class="fas fa-flask mr-2"></i> Manage Tests (${testList.length})</h3>
                    <div class="flex space-x-2">
                        <button onclick="showGeminiModal()" class="btn-primary py-2 px-4 bg-purple-600 hover:bg-purple-700">
                            <i class="fas fa-magic mr-1"></i> Design with AI (Gemini)
                        </button>
                        <button onclick="setState(APP_STATE.ADMIN_MANAGE_TESTS, {editTestId: 'new'})" class="btn-primary py-2 px-4 bg-green-600 hover:bg-green-700">
                            <i class="fas fa-plus mr-1"></i> Create New Test
                        </button>
                    </div>
                </div>
                <div class="relative mb-4">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-muted text-sm"></i>
                    <input id="test-search" type="text" placeholder="Search tests by title or ID..." oninput="filterTestList()" class="input-field w-full pl-9 py-2 text-sm">
                </div>
                <div id="test-list-container" class="space-y-3 max-h-[55vh] overflow-y-auto pr-1">
                    ${testList.map(t => `
                        <div class="test-row card p-4 flex flex-col md:flex-row justify-between items-start md:items-center hover:border-accent-2/50 transition" data-search="${(t.title + ' ' + t.id).toLowerCase()}">
                            <div>
                                <h4 class="font-semibold text-white">${escapeHtml(t.title)}</h4>
                                <p class="text-sm text-muted">ID: ${t.id} | Qs: <span class="text-accent-2">${t.questions.length}</span> | Duration: ${t.duration} min</p>
                                <p class="text-xs ${t.show_marks !== false ? 'text-green-400' : 'text-yellow-400'} mt-1">
                                    <i class="fas ${t.show_marks !== false ? 'fa-eye' : 'fa-eye-slash'} mr-1"></i> Marks: ${t.show_marks !== false ? 'Visible' : 'Hidden'}
                                </p>
                            </div>
                            <div class="flex space-x-2 flex-shrink-0 mt-3 md:mt-0">
                                <button onclick="setState(APP_STATE.ADMIN_MANAGE_TESTS, {editTestId: '${t.id}'})" class="text-sm text-accent-2 hover:text-accent-1 transition">Edit Test & Questions</button>
                                <button onclick="handleDeleteTest('${t.id}')" class="text-sm text-red-400 hover:text-red-500 transition">Delete</button>
                            </div>
                        </div>
                    `).join('')}
                    ${testList.length === 0 ? '<p class="text-muted mt-4">No tests have been created yet. Click "Create New Test" to begin.</p>' : ''}
                </div>
            </div>
        `;
        }

        function filterTestList() {
            const query = (document.getElementById('test-search')?.value || '').toLowerCase();
            document.querySelectorAll('#test-list-container .test-row').forEach(row => {
                row.style.display = (row.getAttribute('data-search') || '').includes(query) ? '' : 'none';
            });
        }

        function renderEditTest() {
            const isNew = state.editTestId === 'new';
            const test = isNew ? { title: '', duration: 60, questions: [] } : DB.tests.find(t => t.id === state.editTestId);

            if (!test && !isNew) return renderError('Test to edit not found.');

            // Decide which form to render: Question form or Test details
            const content = state.editQuestionIndex !== -1 || state.editQuestionType ? renderQuestionForm(test) : renderTestDetails(test, isNew);

            return `
            <div class="fade-in">
                <button onclick="setState(APP_STATE.ADMIN_MANAGE_TESTS, {editTestId: null, editQuestionIndex: -1})" class="btn-primary bg-gray-600 hover:bg-gray-700 mb-4 py-2 px-4">
                    <i class="fas fa-arrow-left mr-2"></i> Back to Test List
                </button>
                <h2 class="text-3xl font-bold text-accent-1 mb-4">${isNew ? 'Create New Test' : `Editing Test: ${escapeHtml(test.title)}`}</h2>
                
                ${content}
            </div>
        `;
        }

        function renderTestDetails(test, isNew) {
            return `
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="card p-6 lg:col-span-1">
                    <h3 class="text-xl font-bold text-accent-2 border-b border-glass pb-2 mb-4"><i class="fas fa-info-circle mr-2"></i> Test Information</h3>
                    <form onsubmit="handleEditTest(event)" class="space-y-4">
                        <input type="hidden" name="testId" value="${test.id || 'new'}">
                        <div>
                            <label class="block text-sm font-medium mb-1 text-white" for="title">Test Title</label>
                            <input id="title" name="title" type="text" required class="input-field w-full" value="${escapeHtml(test.title)}">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1 text-white" for="duration">Duration (Minutes)</label>
                            <input id="duration" name="duration" type="number" required class="input-field w-full" value="${test.duration}" min="1">
                        </div>
                        <div class="flex items-center space-x-2 py-2">
                            <input id="showMarks" name="showMarks" type="checkbox" class="w-5 h-5 text-accent-1 bg-gray-700 border-gray-600 rounded focus:ring-accent-1" ${test.show_marks !== false ? 'checked' : ''}>
                            <label for="showMarks" class="text-sm font-medium text-white cursor-pointer">Show marks to students after test</label>
                        </div>
                        <button type="submit" class="btn-primary w-full bg-accent-1 hover:bg-accent-2">
                            <i class="fas fa-save mr-2"></i> ${isNew ? 'Create Test' : 'Update Info'}
                        </button>
                    </form>
                </div>
                
                <div class="card p-6 lg:col-span-2">
                    <h3 class="text-xl font-bold text-accent-2 border-b border-glass pb-2 mb-4"><i class="fas fa-list-ol mr-2"></i> Questions List (${test.questions.length})</h3>
                    
                    ${!isNew ? `
                        <div class="flex flex-wrap gap-2 mb-4">
                            <button onclick="setState(APP_STATE.ADMIN_MANAGE_TESTS, {editQuestionIndex: -1, editQuestionType: 'mcq'})" class="btn-primary py-2 px-4 bg-blue-600 hover:bg-blue-700">
                                <i class="fas fa-plus mr-1"></i> Add MCQ
                            </button>
                            <button onclick="setState(APP_STATE.ADMIN_MANAGE_TESTS, {editQuestionIndex: -1, editQuestionType: 'msq'})" class="btn-primary py-2 px-4 bg-purple-600 hover:bg-purple-700">
                                <i class="fas fa-plus mr-1"></i> Add MSQ
                            </button>
                        </div>

                        <div class="space-y-3">
                            ${test.questions.map((q, index) => `
                                <div class="card p-4 flex flex-col sm:flex-row justify-between items-start hover:border-accent-2/50 transition">
                                    <div>
                                        <span class="font-semibold text-accent-1">${index + 1}. (${q.type.toUpperCase()}, ${q.marks} marks)</span>
                                        <p class="text-white mt-1">${q.q.substring(0, 100)}${q.q.length > 100 ? '...' : ''}</p>
                                    </div>
                                    <div class="flex space-x-2 flex-shrink-0 pt-1">
                                        <button onclick="setState(APP_STATE.ADMIN_MANAGE_TESTS, {editQuestionIndex: ${index}, editQuestionType: '${q.type}'})" class="text-sm text-accent-2 hover:text-accent-1 transition">Edit</button>
                                        <button onclick="handleDeleteQuestion(${index})" class="text-sm text-red-400 hover:text-red-500 transition">Delete</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    ` : '<div class="text-muted mt-4 p-4 card">Save the test info first to begin adding questions.</div>'}
                </div>
            </div>
        `;
        }

        function renderQuestionForm(test) {
            const index = state.editQuestionIndex;
            const isNew = index === -1;
            const q = isNew ? {
                q: '',
                marks: 1,
                options: { A: '', B: '', C: '', D: '' },
                correct: state.editQuestionType === 'msq' ? [] : 'A',
                type: state.editQuestionType
            } : test.questions[index];

            // Determine the question type for the form, using state.editQuestionType for new questions
            const questionType = q.type;

            const correctMCQHtml = `
            <select id="correctMCQ" name="correctMCQ" required class="input-field w-full">
                ${['A', 'B', 'C', 'D'].map(key => `
                    <option value="${key}" ${q.correct === key ? 'selected' : ''}>Option ${key}</option>
                `).join('')}
            </select>
        `;

            const correctMSQHtml = `
            <div class="grid grid-cols-2 gap-4">
                ${['A', 'B', 'C', 'D'].map(key => {
                const isChecked = Array.isArray(q.correct) && q.correct.includes(key);
                return `
                        <label class="flex items-center space-x-2 p-3 card hover:border-accent-1 cursor-pointer">
                            <input type="checkbox" name="correctMSQ" value="${key}" ${isChecked ? 'checked' : ''} class="w-4 h-4 text-accent-1 bg-gray-700 border-gray-600 rounded focus:ring-accent-1">
                            <span class="text-white font-medium">Option ${key} is Correct</span>
                        </label>
                    `;
            }).join('')}
            </div>
        `;

            const correctHtml = questionType === 'mcq' ? correctMCQHtml : correctMSQHtml;


            return `
            <div class="card p-6 max-w-4xl mx-auto">
                <h3 class="text-2xl font-bold mb-4 text-accent-1 border-b border-glass pb-2">
                    <i class="fas ${isNew ? 'fa-plus' : 'fa-edit'} mr-2"></i> ${isNew ? 'Add New' : 'Edit'} Question (${questionType.toUpperCase()})
                </h3>
                
                <form onsubmit="handleSaveQuestion(event)" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium mb-1 text-white" for="questionText">Question Text</label>
                        <textarea id="questionText" name="questionText" required class="input-field w-full" rows="3">${escapeHtml(q.q)}</textarea>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-1 text-white" for="marks">Marks for Correct Answer</label>
                            <input id="marks" name="marks" type="number" required class="input-field w-full" value="${q.marks}" min="1">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1 text-white">Question Type</label>
                            <select id="editQuestionTypeToggle" class="input-field w-full" onchange="state.editQuestionType = this.value; renderApp(true)">
                                <option value="mcq" ${questionType === 'mcq' ? 'selected' : ''}>MCQ (Single Correct)</option>
                                <option value="msq" ${questionType === 'msq' ? 'selected' : ''}>MSQ (Multiple Correct)</option>
                            </select>
                        </div>
                    </div>

                    <h4 class="text-xl font-bold text-accent-2 border-b border-glass pb-2">Answer Options (A, B, C, D)</h4>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        ${['A', 'B', 'C', 'D'].map(key => `
                            <div>
                                <label class="block text-sm font-medium mb-1 text-white" for="option${key}">Option ${key}</label>
                                <input id="option${key}" name="option${key}" type="text" required class="input-field w-full" value="${escapeHtml(q.options[key])}">
                            </div>
                        `).join('')}
                    </div>

                    <h4 class="text-xl font-bold text-accent-2 border-b border-glass pb-2">Correct Answer(s)</h4>
                    <div>
                        ${correctHtml}
                    </div>

                    <button type="submit" class="btn-primary w-full bg-green-600 hover:bg-green-700">
                        <i class="fas fa-save mr-2"></i> ${isNew ? 'Add Question' : 'Update Question'}
                    </button>
                    <button type="button" onclick="setState(APP_STATE.ADMIN_MANAGE_TESTS, {editQuestionIndex: -1, editQuestionType: null})" class="btn-primary w-full bg-gray-600 hover:bg-gray-700">
                        <i class="fas fa-times mr-2"></i> Cancel
                    </button>
                </form>
            </div>
        `;
        }

        function renderManageStudents() {
            const currentAdminId = state.currentUser.id;
            const isAdmin = state.currentUser.role === 'admin';

            // Filter out the admin account and filter by admin_id if current user is an admin
            const studentList = Object.keys(DB.students)
                .filter(id => id !== DB.admin.id && (!isAdmin || DB.students[id].admin_id === currentAdminId))
                .map(id => ({ id, ...DB.students[id] }));

            return `
            <div class="card p-6">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 border-b border-glass pb-2">
                    <h3 class="text-xl font-bold text-accent-2 mb-2 sm:mb-0"><i class="fas fa-users mr-2"></i> Manage Students (${studentList.length})</h3>
                    <div class="flex space-x-2">
                        <button onclick="renderBulkUploadModal()" class="btn-primary py-2 px-4 bg-blue-600 hover:bg-blue-700">
                            <i class="fas fa-file-upload mr-1"></i> Bulk Upload (Excel/Word/CSV)
                        </button>
                        <button onclick="renderCreateStudentAndAssignModal()" class="btn-primary py-2 px-4 bg-green-600 hover:bg-green-700">
                            <i class="fas fa-user-plus mr-1"></i> Add New Student
                        </button>
                    </div>
                </div>
                <div class="relative mb-4">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-muted text-sm"></i>
                    <input id="student-search" type="text" placeholder="Search by name or ID..." oninput="filterStudentList()" class="input-field w-full pl-9 py-2 text-sm">
                </div>
                <div id="student-list-container" class="space-y-3 max-h-[55vh] overflow-y-auto pr-1">
                    ${studentList.map(s => {
                const assignmentsCount = DB.assignments[s.id] ? DB.assignments[s.id].length : 0;
                const resultsCount = DB.results[s.id] ? Object.keys(DB.results[s.id]).length : 0;

                return `

        function renderViewResults() {
            const currentAdminId = state.currentUser.id;
            const isAdmin = state.currentUser.role === 'admin';

            const studentList = Object.keys(DB.students)
                .filter(id => id !== DB.admin.id && (!isAdmin || DB.students[id].admin_id === currentAdminId))
                .map(id => ({ id, ...DB.students[id] }));
            const testList = DB.tests;

            const tableHeader = `
            <thead>
                <tr class="text-left text-sm font-semibold text-accent-2 border-b border-glass/50 sticky top-0 bg-bg-card z-10">
                    <th class="p-3 w-48">Student Name (ID)</th>
                    ${testList.map(t => `<th class="p-3 text-center w-40">${escapeHtml(t.title)}</th>`).join('')}
                </tr>
            </thead>
        `;

            const tableBody = `
            <tbody class="divide-y divide-glass/50">
                ${studentList.map(s => `
                    <tr class="admin-table-row hover:bg-glass">
                        <td class="p-3 font-semibold text-white">${escapeHtml(s.name)}<p class="text-xs text-muted font-normal">${s.id}</p></td>
                        ${testList.map(t => {
                const result = DB.results[s.id] ? DB.results[s.id][t.id] : null;
                if (!result) {
                    // Check if assigned but not completed
                    const isAssigned = DB.assignments[s.id] && DB.assignments[s.id].includes(t.id);
                    return `<td class="p-3 text-center text-xs text-muted">${isAssigned ? 'Assigned (Pending)' : 'Not Assigned'}</td>`;
                }

                const percentage = Math.round((result.score / result.maxScore) * 100);
                const scoreColor = percentage >= 75 ? 'text-green-400' : (percentage >= 50 ? 'text-yellow-400' : 'text-red-400');
                const offenseColor = result.fullScreenOffenses > 0 ? 'text-red-400' : 'text-green-400';

                // Prepare snapshot button action and class
                const hasSnapshots = result.snapshots && result.snapshots.length > 0;
                const snapshotAction = hasSnapshots
                    ? `onclick="showSnapshotsModal('${escapeHtml(s.name)}', '${escapeHtml(t.title)}', JSON.parse(decodeURIComponent('${encodeSnapshots(result.snapshots)}')))"`
                    : '';
                const snapshotClass = hasSnapshots ? 'hover:text-accent-2 cursor-pointer' : 'opacity-50 cursor-default';
                return `
                                <td class="p-3 text-center text-xs space-y-1">
                                    <p class="font-bold ${scoreColor}">Score: ${result.score} / ${result.maxScore} (${percentage}%)</p>
                                    <p class="text-xs ${offenseColor}"><i class="fas fa-desktop mr-1"></i>Tab/FS: ${result.fullScreenOffenses || 0}</p>
                                    <button class="text-xs text-yellow-500 transition mt-1 ${snapshotClass}" ${snapshotAction}>
                                        <i class="fas fa-camera mr-1"></i> Snapshots (${result.snapshots.length})
                                    </button>
                                </td>
                            `;
            }).join('')}
                    </tr>
                `).join('')}
            </tbody>
        `;

            return `
            <div class="card p-6">
                <h3 class="text-xl font-bold mb-6 border-b border-glass pb-2"><i class="fas fa-award mr-2"></i> Exam Results Overview</h3>
                <div class="overflow-x-auto max-h-[70vh]">
                    <table class="min-w-full divide-y divide-glass/50">
                        ${tableHeader}
                        ${tableBody}

                ${studentList.length === 0 ? '<p class="text-muted mt-4">No student accounts found to view results.</p>' : ''}
            </div>

        function renderExamSidebar(questions) {
            // We rely on state.currentQuestionView being updated by updateExamStatusUI or navigateToQuestion
            const currentQuestion = state.currentQuestionView;

            return `

                <div class="exam-sidebar card p-4 space-y-4">
                    
                    <h3 class="text-xl font-bold text-accent-1 border-b border-glass pb-2">Question Navigation</h3>

                        ${questions.map((q, index) => {
                const qNum = index + 1;
                const studentAnswer = state.examAnswers[q.id];
                const isAnswered = studentAnswer !== null && studentAnswer !== undefined && (Array.isArray(studentAnswer) ? studentAnswer.length > 0 : true);

                let statusClass = 'pending';
                if (isAnswered) statusClass = 'answered';
                if (qNum === currentQuestion) statusClass = 'current';

                return `
                                <button onclick="navigateToQuestion(${qNum})" class="question-nav-item ${statusClass} text-sm text-center">

            }).join('')}

                    </div>

                    <button onclick="showConfirmSubmitModal()" class="btn-primary w-full bg-red-600 hover:bg-red-700">
                        <i class="fas fa-flag-checkered mr-2"></i> End & Submit Test
                    </button>
                    
                </div>
            </div>
        `;
        }


        function renderQuestion(q, qNum, totalQuestions) {
            // Get student's current answer for this question
            const studentAnswer = state.examAnswers[q.id];

            // Check if an answer is currently selected (for styling)
            const isSelected = (optionKey) => {
                if (q.type === 'mcq') {
                    return studentAnswer === optionKey;
                } else if (q.type === 'msq' && Array.isArray(studentAnswer)) {
                    return studentAnswer.includes(optionKey);
                }
                return false;
            };

            const optionsHtml = Object.keys(q.options).map(key => {
                const isChecked = isSelected(key);
                const inputType = q.type === 'mcq' ? 'radio' : 'checkbox';
                const inputName = q.type === 'mcq' ? q.id : key;
                const inputId = `${q.id}-${key}`;
                const isMsQ = q.type === 'msq';

                const checkedClass = isChecked ? 'border-accent-2 ring-4 ring-accent-2/50' : 'border-glass';
                const checkedIcon = isMsQ ? (isChecked ? 'fa-check-square' : 'fa-square') : (isChecked ? 'fa-circle-dot' : 'fa-circle');

                return `
                <label for="${inputId}" class="flex items-start space-x-4 p-4 card hover:border-accent-1 cursor-pointer ${checkedClass} transition">
                    <input 
                        id="${inputId}" 
                        type="${inputType}" 
                        name="${q.id}" 
                        value="${key}" 
                        ${isChecked ? 'checked' : ''} 
                        onclick="updateAnswer('${q.id}', '${key}', '${q.type}')"
                        class="hidden"
                    />
                    <i class="fas ${checkedIcon} text-2xl mt-1 flex-shrink-0 ${isChecked ? 'text-accent-2' : 'text-muted'}"></i>

                    <span class="font-medium text-white flex-grow">
                        <span class="font-bold text-accent-1 mr-2">${key}.</span>
                        ${escapeHtml(q.options[key])}
                    </span>
                </label>
            `;
            }).join('');

            const isAnswered = studentAnswer !== null && studentAnswer !== undefined && (Array.isArray(studentAnswer) ? studentAnswer.length > 0 : true);
            const answerStatus = isAnswered ? '<span class="text-green-400"><i class="fas fa-check-circle mr-1"></i> Answered</span>' : '<span class="text-red-400"><i class="fas fa-times-circle mr-1"></i> Pending</span>';

            return `
            <div id="${q.id}" class="card p-6 fade-in border-accent-1/50">
                <div class="flex justify-between items-center mb-4 border-b border-glass pb-2">
                    <h4 class="text-xl font-bold text-white">Question ${qNum} <span class="text-sm font-normal text-accent-2">(${q.type.toUpperCase()}, ${q.marks} marks)</span> </h4>
                    <div class="text-sm">${answerStatus}</div>
                </div>
                <p class="text-white mb-6 text-lg">${escapeHtml(q.q)}</p>
                <div class="space-y-3">
                    ${optionsHtml}
                </div>
                
                <div class="flex justify-between mt-6 pt-4 border-t border-glass">
                    <button onclick="navigateToQuestion(${qNum - 1})" ${qNum === 1 ? 'disabled' : ''} class="btn-primary py-2 px-4 bg-gray-600 hover:bg-gray-700 disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fas fa-arrow-left mr-2"></i> Previous
                    </button>
                    <button onclick="navigateToQuestion(${qNum + 1})" ${qNum === totalQuestions ? 'disabled' : ''} class="btn-primary py-2 px-4 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed">
                        Next <i class="fas fa-arrow-right ml-2"></i>
                    </button>
                </div>
            </div>
        `;
        }

        function toggleInstructionsAccept() {
            const cb = document.getElementById('accept-instructions');
            const btn = document.getElementById('proceed-exam-btn');
            if (cb && btn) {
                btn.disabled = !cb.checked;
                if (cb.checked) {
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                    btn.classList.add('hover:scale-[1.02]', 'shadow-lg', 'shadow-green-500/30');
                } else {
                    btn.classList.add('opacity-50', 'cursor-not-allowed');
                    btn.classList.remove('hover:scale-[1.02]', 'shadow-lg', 'shadow-green-500/30');
                }
            }
        }

        function copyGeminiPrompt() {
            const topic = prompt("Enter the subject/topic for the exam:", "General Knowledge");
            if (!topic) return;

            const smartPrompt = `Act as an expert examiner. Generate a high-quality test on the topic: "${topic}".
Provide exactly 10 questions.
MANDATORY: Provide a MIX of:
- MCQ (Multiple Choice Question, Single Correct Answer)
- MSQ (Multiple Select Question, Multiple Correct Answers)

IMPORTANT: You MUST provide the output ONLY as a valid JSON array of objects. Do not include any other text, markdown blocks, or explanations.

Format for each question object:
{
  "q": "Question text here",
  "options": {"A": "Option 1", "B": "Option 2", "C": "Option 3", "D": "Option 4"},
  "correct": "A" (for MCQ) or ["A", "B"] (for MSQ),
  "marks": 1 (for MCQ) or 2 (for MSQ),
  "type": "mcq" or "msq"
}

Ensure the JSON is perfectly formatted so I can parse it programmatically.`;

            navigator.clipboard.writeText(smartPrompt);
            alert('Smart Prompt copied! Now paste it into Gemini.');
        }

        function handleSmartAIImport() {
            const textArea = document.getElementById('ai-import-area');
            const rawText = textArea.value.trim();
            
            if (!rawText) {
                alert("Please paste the AI output first.");
                return;
            }

            try {
                // Clean up markdown code blocks if present
                const jsonText = rawText.replace(/\`\`\`json/g, '').replace(/\`\`\`/g, '').trim();
                const questions = JSON.parse(jsonText);

                if (!Array.isArray(questions)) {
                    throw new Error("Output must be a JSON array of questions.");
                }

                let test;
                // If not in a test editor, create a new test
                if (!state.editTestId) {
                    const newTitle = prompt("Enter a Title for this new AI-generated test:", "AI Generated Test");
                    if (!newTitle) return;

                    const newTestId = generateId('t_ai');
                    test = {
                        id: newTestId,
                        title: newTitle,
                        duration: 30,
                        questions: [],
                        show_marks: true
                    };
                    DB.tests.push(test);
                    state.editTestId = newTestId;
                } else {
                    test = DB.tests.find(t => t.id === state.editTestId);
                }

                if (!test) {
                    alert("No active test found and failed to create new one.");
                    return;
                }

                let importedCount = 0;
                questions.forEach(q => {
                    if (q.q && q.options && q.correct && q.type) {
                        test.questions.push({
                            id: generateId('q_ai'),
                            q: q.q,
                            options: q.options,
                            correct: q.correct,
                            marks: q.marks || (q.type === 'msq' ? 2 : 1),
                            type: q.type
                        });
                        importedCount++;
                    }
                });

                saveDB();
                alert(`Successfully imported ${importedCount} questions into "${test.title}"!`);
                textArea.closest('.fixed').remove();
                
                // Refresh the test editor view
                setState(APP_STATE.ADMIN_MANAGE_TESTS, { editTestId: state.editTestId, editQuestionIndex: -1 });

            } catch (err) {
                console.error("Import failed:", err);
                alert("Failed to parse AI output. Ensure you copied the FULL JSON array from Gemini and it is formatted correctly.\n\nError: " + err.message);
            }
        }

        function renderApp(skipFade = false) {
            const app = document.getElementById('app');
            if (!app) return;

            let content;
            switch (state.appState) {
                case APP_STATE.ADMIN_DASHBOARD:
                case APP_STATE.ADMIN_MANAGE_TESTS:
                case APP_STATE.ADMIN_MANAGE_STUDENTS:
                case APP_STATE.ADMIN_MANAGE_ASSIGNMENTS:
                case APP_STATE.ADMIN_VIEW_RESULTS:
                    content = renderAdminDashboard();
                    break;
                case APP_STATE.SUPERADMIN_DASHBOARD:
                case APP_STATE.SUPERADMIN_MANAGE_ADMINS:
                case APP_STATE.SUPERADMIN_ACTIVITY_LOG:
                case APP_STATE.SUPERADMIN_SYSTEM_SETTINGS:
                    content = renderSuperAdminDashboard();
                    break;
                case APP_STATE.STUDENT_DASHBOARD:
                    content = renderStudentDashboard();
                    break;
                case APP_STATE.STUDENT_PROFILE:
                    content = renderStudentProfile();
                    break;
                case APP_STATE.EXAM_INSTRUCTIONS:
                    content = renderExamInstructions();
                    break;
                case APP_STATE.EXAM:
                    content = renderExam();
                    break;
                case APP_STATE.ERROR:
                    content = renderError('An unrecoverable application error occurred.');
                    break;
                case APP_STATE.LOGIN:
                default:
                    content = renderLogin();
                    break;
            }

            // Clear the current content, optionally removing the fade-in class for smooth transitions
            if (skipFade) {
                app.innerHTML = content;
            } else {
                app.innerHTML = content;
                // Apply a general fade-in animation to the main content for fresh loads
                if (state.appState !== APP_STATE.EXAM) {
                    // Re-apply fade-in class to trigger the animation if not in exam mode
                    app.classList.remove('fade-in');
                    void app.offsetWidth; // Trigger reflow
                    app.classList.add('fade-in');
                }
            }

            // Ensure the theme is set correctly on every render
            setTheme(getTheme());

            // Important: Since we perform a soft re-render in exam mode, re-attach event listeners here if necessary
            if (state.appState === APP_STATE.EXAM) {
                reAttachCamera();
            }
        }

                            <i class="fas ${getTheme() === 'dark' ? 'fa-sun' : 'fa-moon'} text-xl"></i>
                        </button>
                    </header>
        `;

            if (state.appState === APP_STATE.SUPERADMIN_DASHBOARD) {
                const adminCount = Object.keys(DB.admins).length + (DB.admin && !DB.admins['admin'] ? 1 : 0);
                const studentCount = Object.keys(DB.students).length;
                const testCount = DB.tests.length;
                
                // Calculate total results across all students
                let totalResults = 0;
                Object.values(DB.results).forEach(studentResults => {
                    totalResults += Object.keys(studentResults).length;
                });

                content += `
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                    <div class="stat-card p-5 rounded-xl shadow-lg border border-glass flex items-center slide-up">
                        <div class="p-3 rounded-full bg-purple-500/20 text-purple-400 mr-3">
                            <i class="fas fa-user-shield text-xl"></i>
                        </div>
                        <div>
                            <p class="text-xs text-text-muted uppercase tracking-wider font-semibold">Admins</p>
                            <h3 class="text-2xl font-bold mt-1">${adminCount}</h3>
                        </div>
                    </div>
                    <div class="stat-card p-5 rounded-xl shadow-lg border border-glass flex items-center slide-up delay-100">
                        <div class="p-3 rounded-full bg-blue-500/20 text-blue-400 mr-3">
                            <i class="fas fa-users text-xl"></i>
                        </div>
                        <div>
                            <p class="text-xs text-text-muted uppercase tracking-wider font-semibold">Students</p>
                            <h3 class="text-2xl font-bold mt-1">${studentCount}</h3>
                        </div>
                    </div>
                    <div class="stat-card p-5 rounded-xl shadow-lg border border-glass flex items-center slide-up delay-200">
                        <div class="p-3 rounded-full bg-green-500/20 text-green-400 mr-3">
                            <i class="fas fa-file-alt text-xl"></i>
                        </div>
                        <div>
                            <p class="text-xs text-text-muted uppercase tracking-wider font-semibold">Tests</p>
                            <h3 class="text-2xl font-bold mt-1">${testCount}</h3>
                        </div>
                    </div>
                    <div class="stat-card p-5 rounded-xl shadow-lg border border-glass flex items-center slide-up delay-300">
                        <div class="p-3 rounded-full bg-yellow-500/20 text-yellow-400 mr-3">
                            <i class="fas fa-poll text-xl"></i>
                        </div>
                        <div>
                            <p class="text-xs text-text-muted uppercase tracking-wider font-semibold">Results</p>
                            <h3 class="text-2xl font-bold mt-1">${totalResults}</h3>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="card p-6 slide-up delay-400">
                        <h2 class="text-xl font-bold text-accent-1 mb-4 flex items-center">
                            <i class="fas fa-paper-plane mr-2"></i> Broadcast Center
                        </h2>
                        <form onsubmit="handleSendMessage(event)" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium mb-1 text-muted">Send Message To:</label>
                                <select name="receiverRole" class="input-field w-full text-sm">
                                    <option value="all">Everyone (Admins & Students)</option>
                                    <option value="admin">All Admins Only</option>
                                    <option value="student">All Students Only</option>
                                </select>
                            </div>
                            <div>
                                <textarea name="messageContent" class="input-field w-full h-24 text-sm" placeholder="Type your broadcast message here..." required></textarea>
                            </div>
                            <button type="submit" class="btn-primary w-full bg-accent-1">
                                <i class="fas fa-broadcast-tower mr-2"></i> Send Broadcast
                            </button>
                        </form>
                    </div>
                </div>
            `;
            } else if (state.appState === APP_STATE.SUPERADMIN_MANAGE_ADMINS) {
                content += `
                <div class="bg-bg-card rounded-xl shadow-lg p-6 border border-glass mb-8 slide-up">
                    <h2 class="text-2xl font-bold text-accent-1 mb-4">Register New Admin</h2>
                    <form onsubmit="handleCreateAdmin(event)" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Admin ID</label>
                            <input type="text" name="id" required class="input-field w-full transition-transform focus:scale-[1.02]">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Name</label>
                            <input type="text" name="name" required class="input-field w-full transition-transform focus:scale-[1.02]">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Password</label>
                            <input type="password" name="pass" required class="input-field w-full transition-transform focus:scale-[1.02]">
                        </div>
                        <div class="md:col-span-3">
                            <button type="submit" class="btn-primary w-full bg-purple-600 hover:bg-purple-700 hover:scale-[1.01] transition-transform">
                                <i class="fas fa-user-plus mr-2"></i> Register Admin
                            </button>
                        </div>
                    </form>
                </div>

                <div class="bg-bg-card rounded-xl shadow-lg border border-glass overflow-hidden slide-up delay-100">
                    <div class="p-4 border-b border-glass flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                        <h2 class="text-xl font-bold text-accent-2">Registered Admins</h2>
                        <div class="relative w-full sm:w-64">
                            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-muted text-sm"></i>
                            <input id="admin-search" type="text" placeholder="Search admins..." oninput="filterAdminList()" class="input-field w-full pl-9 py-2 text-sm">
                        </div>
                    </div>
                    <div class="overflow-x-auto max-h-[40vh] overflow-y-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="sticky top-0 z-10">
                                <tr class="bg-black/20 text-xs uppercase tracking-wider">
                                    <th class="p-4 font-semibold text-text-muted">Admin ID</th>
                                    <th class="p-4 font-semibold text-text-muted">Name</th>
                                    <th class="p-4 font-semibold text-text-muted text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="admin-list-tbody" class="divide-y divide-glass text-sm">
            `;

                // Combine legacy admin and modern admins
                const allAdmins = [];
                if (DB.admin && !DB.admins['admin']) {
                    allAdmins.push({ id: DB.admin.id, name: 'Legacy Admin', pass: DB.admin.pass });
                }
                for (let id in DB.admins) {
                    allAdmins.push({ id: id, ...DB.admins[id] });
                }

                if (allAdmins.length === 0) {
                    content += `<tr><td colspan="3" class="p-4 text-center text-text-muted italic">No admins registered yet.</td></tr>`;
                } else {
                    allAdmins.forEach(admin => {
                        content += `
                        <tr class="admin-row hover:bg-white/5 transition duration-150" data-search="${(admin.id + ' ' + admin.name).toLowerCase()}">
                            <td class="p-4 font-mono text-purple-300">${escapeHtml(admin.id)}</td>
                            <td class="p-4">${escapeHtml(admin.name)}</td>
                            <td class="p-4 text-center flex justify-center space-x-3">
                                <button onclick="handleChangeAdminPassword('${admin.id}')" class="text-accent-2 hover:text-yellow-300 transition" title="Change Password">
                                    <i class="fas fa-key"></i>
                                </button>
                                <button onclick="handleDeleteAdmin('${admin.id}')" class="text-red-400 hover:text-red-300 transition" title="Delete Admin">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                    });
                }

                content += `
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            } else if (state.appState === APP_STATE.SUPERADMIN_ACTIVITY_LOG) {
                const logs = DB.logs || [];
                content += `
                <div class="bg-bg-card rounded-xl shadow-lg border border-glass overflow-hidden slide-up">
                    <div class="p-6 border-b border-glass flex justify-between items-center">
                        <h2 class="text-2xl font-bold text-accent-1"><i class="fas fa-history mr-2"></i> System Activity Log</h2>
                        <span class="text-xs text-muted uppercase tracking-widest">Showing last ${logs.length} events</span>
                    </div>
                    <div class="overflow-x-auto max-h-[65vh] overflow-y-auto custom-scrollbar">
                        <table class="w-full text-left border-collapse">
                            <thead class="sticky top-0 bg-bg-card z-10">
                                <tr class="bg-black/20 text-[10px] uppercase tracking-widest text-text-muted">
                                    <th class="p-4">Timestamp</th>
                                    <th class="p-4">Event</th>
                                    <th class="p-4">User ID</th>
                                    <th class="p-4">Details</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-glass/30 text-xs">
                                ${logs.map(log => `
                                    <tr class="hover:bg-white/5 transition">
                                        <td class="p-4 text-muted whitespace-nowrap">${new Date(log.timestamp).toLocaleString()}</td>
                                        <td class="p-4"><span class="px-2 py-0.5 rounded-full bg-accent-1/10 text-accent-1 font-bold">${log.type}</span></td>
                                        <td class="p-4 font-mono">${log.userId}</td>
                                        <td class="p-4 text-gray-300 italic">${log.details}</td>
                                    </tr>
                                `).join('')}
                                ${logs.length === 0 ? '<tr><td colspan="4" class="p-8 text-center text-muted">No activity recorded yet.</td></tr>' : ''}
                            </tbody>
                        </table>
                    </div>
                </div>
                `;
            } else if (state.appState === APP_STATE.SUPERADMIN_SYSTEM_SETTINGS) {
                content += `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 slide-up">
                    <div class="card p-6 border-blue-500/30">
                        <h3 class="text-xl font-bold text-blue-400 mb-4 flex items-center">
                            <i class="fas fa-database mr-2"></i> Database Management
                        </h3>
                        <p class="text-sm text-muted mb-6">Download a complete backup of the platform database in JSON format. This includes all users, tests, results, and logs.</p>
                        <button onclick="handleDownloadBackup()" class="btn-primary w-full bg-blue-600 hover:bg-blue-700">
                            <i class="fas fa-download mr-2"></i> Download Full Backup (.json)
                        </button>
                    </div>

                    <div class="card p-6 border-red-500/30">
                        <h3 class="text-xl font-bold text-red-400 mb-4 flex items-center">
                            <i class="fas fa-exclamation-triangle mr-2"></i> System Factory Reset
                        </h3>
                        <p class="text-sm text-muted mb-6">Warning: This action will permanently delete all tests, results, messages, and accounts (except SuperAdmin). This cannot be undone.</p>
                        <button onclick="handleResetSystem()" class="btn-primary w-full bg-red-600 hover:bg-red-700">
                            <i class="fas fa-trash-alt mr-2"></i> Perform Factory Reset
                        </button>
                    </div>

                    <div class="card p-6 border-accent-1/30 md:col-span-2">
                        <h3 class="text-xl font-bold text-accent-1 mb-4 flex items-center">
                            <i class="fas fa-info-circle mr-2"></i> Platform Information
                        </h3>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
                            <div class="p-3 bg-black/20 rounded-lg">
                                <p class="text-xs text-muted">Version</p>
                                <p class="text-lg font-bold text-white">v4.2.0</p>
                            </div>
                            <div class="p-3 bg-black/20 rounded-lg">
                                <p class="text-xs text-muted">DB Size</p>
                                <p class="text-lg font-bold text-white">${(JSON.stringify(DB).length / 1024).toFixed(2)} KB</p>
                            </div>
                            <div class="p-3 bg-black/20 rounded-lg">
                                <p class="text-xs text-muted">Uptime</p>
                                <p class="text-lg font-bold text-white">Active</p>
                            </div>
                            <div class="p-3 bg-black/20 rounded-lg">
                                <p class="text-xs text-muted">Environment</p>
                                <p class="text-lg font-bold text-white">Production</p>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }

            content += `
                </main>
            </div>
        `;
            return content;
        }

        function handleDownloadBackup() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(DB, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", `exammiee_backup_${new Date().toISOString().split('T')[0]}.json`);
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
            logEvent('SYSTEM_BACKUP', state.currentUser.id, 'Downloaded full JSON backup');
        }

        async function handleResetSystem() {
            if (confirm("CRITICAL WARNING: Are you sure you want to FACTORY RESET the entire system? ALL data will be lost forever.")) {
                if (confirm("FINAL CONFIRMATION: Type 'RESET' to confirm.")) {
                    const confirmText = prompt("Type 'RESET' below:");
                    if (confirmText === 'RESET') {
                        try {
                            const response = await fetch('/api/factory-reset', { method: 'POST' });
                            if (response.ok) {
                                // Keep superadmin and basic structure, wipe others
                                DB = {
                                    admins: {},
                                    students: {},
                                    tests: [],
                                    results: {},
                                    assignments: {},
                                    admin: null,
                                    messages: [],
                                    logs: [{ timestamp: new Date().toISOString(), type: 'SYSTEM_RESET', userId: 'superadmin', details: 'System factory reset performed' }]
                                };
                                await saveDB();
                                showModal('System Reset', 'Factory reset successful. All database tables have been cleared.');
                                handleLogout();
                            } else {
                                showModal('Reset Failed', 'Server failed to perform factory reset.', true);
                            }
                        } catch (err) {
                            showModal('Error', 'Unable to connect to the server for reset.', true);
                        }
                    }
                }
            }
        }

        async function handleCreateAdmin(e) {
            e.preventDefault();
            const form = e.target;
            const id = form.id.value.toLowerCase().trim();
            const name = form.name.value.trim();
            const pass = form.pass.value;

            if (DB.admins[id] || (DB.admin && DB.admin.id === id) || id === 'superadmin') {
                showModal('Registration Failed', 'An admin with this ID already exists.', true);
                return;
            }

            DB.admins[id] = { name: name, pass: pass };
            await saveDB();
            form.reset();
            setState(APP_STATE.SUPERADMIN_MANAGE_ADMINS);
            showModal('Success', 'Admin registered successfully.');
        }

        async function handleDeleteAdmin(id) {
            if (confirm(`Are you sure you want to delete admin '${id}'? This cannot be undone.`)) {
                if (DB.admin && DB.admin.id === id) {
                    DB.admin = null; // Remove legacy admin
                }
                delete DB.admins[id];
                await saveDB();
                setState(APP_STATE.SUPERADMIN_MANAGE_ADMINS);
                showModal('Success', 'Admin deleted successfully.');
            }
        }

        async function handleChangeAdminPassword(adminId) {
            const newPass = prompt(`Enter new password for admin '${adminId}':`);
            if (newPass && newPass.trim().length >= 4) {
                try {
                    const res = await fetch('/api/admin/change-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ admin_id: adminId, new_password: newPass })
                    });
                    const data = await res.json();
                    if (data.success) {
                        // Also update local DB state
                        if (DB.admins[adminId]) DB.admins[adminId].pass = newPass;
                        if (DB.admin && DB.admin.id === adminId) DB.admin.pass = newPass;
                        
                        showModal('Success', 'Admin password updated successfully.');
                        await loadDB(); // Sync with server
                    } else {
                        showModal('Error', data.message || 'Failed to update password.', true);
                    }
                } catch (err) {
                    console.error('Password change error:', err);
                    showModal('Error', 'Connection failed.', true);
                }
            } else if (newPass !== null) {
                showModal('Invalid Password', 'Password must be at least 4 characters long.', true);
            }
        }

        function filterAdminList() {
            const query = (document.getElementById('admin-search')?.value || '').toLowerCase();
            document.querySelectorAll('#admin-list-tbody .admin-row').forEach(row => {
                row.style.display = (row.getAttribute('data-search') || '').includes(query) ? '' : 'none';
            });
        }

        async function handleSendMessage(e) {
            e.preventDefault();
            const form = e.target;
            const content = form.messageContent.value.trim();
            const receiverRole = form.receiverRole ? form.receiverRole.value : 'student';
            
            if (!content) return;

            const payload = {
                sender_id: state.currentUser.id,
                sender_name: state.currentUser.name,
                receiver_role: receiverRole,
                content: content,
                admin_id: state.currentUser.role === 'admin' ? state.currentUser.id : null
            };

            try {
                const res = await fetch('/api/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    form.reset();
                    showModal('Success', 'Message sent successfully!');
                    // Refresh messages locally
                    const adminId = state.currentUser.role === 'student' ? (DB.students[state.currentUser.id]?.admin_id) : null;
                    const msgRes = await fetch(`/api/messages?userId=${state.currentUser.id}&role=${state.currentUser.role}&adminId=${adminId}`);
                    if (msgRes.ok) state.messages = await msgRes.json();
                    renderApp(true);
                }
            } catch (err) {
                showModal('Error', 'Failed to send message.', true);
            }
        }

        function toggleMessages() {
            state.isMessagePanelOpen = !state.isMessagePanelOpen;
            const panel = document.getElementById('message-panel');
            if (panel) {
                if (state.isMessagePanelOpen) {
                    panel.style.visibility = 'visible';
                    panel.classList.remove('translate-x-[120%]', 'pointer-events-none');
                } else {
                    panel.classList.add('translate-x-[120%]', 'pointer-events-none');
                    // Wait for transition to finish before hiding visibility
                    setTimeout(() => {
                        if (!state.isMessagePanelOpen) panel.style.visibility = 'hidden';
                    }, 500);
                }
            }
        }

        function renderMessages() {
            if (!state.messages || state.messages.length === 0) {
                return `
                <div class="flex flex-col items-center justify-center py-12 text-muted opacity-60">
                    <i class="fas fa-comment-slash text-4xl mb-3"></i>
                    <p class="text-sm italic">Your inbox is currently empty</p>
                </div>`;
            }

            return state.messages.map(msg => {
                const isSystem = msg.sender_id === 'superadmin';
                const accentColor = isSystem ? 'purple' : 'blue';
                const icon = isSystem ? 'fa-shield-alt' : 'fa-chalkboard-teacher';

                return `
                <div class="message-card p-4 rounded-2xl bg-black/30 border border-glass mb-4 slide-up hover:border-${accentColor}-500/30 transition-all duration-300">
                    <div class="flex gap-4">
                        <div class="flex-shrink-0">
                            <div class="w-10 h-10 rounded-full bg-${accentColor}-500/10 flex items-center justify-center border border-${accentColor}-500/20">
                                <i class="fas ${icon} text-${accentColor}-400"></i>
                            </div>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-start mb-1">
                                <h4 class="text-sm font-bold text-white truncate pr-2">${escapeHtml(msg.sender_name)}</h4>
                                <span class="text-[9px] text-muted whitespace-nowrap bg-white/5 px-2 py-0.5 rounded-full">${new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                            </div>
                            <p class="text-xs text-gray-300 leading-relaxed break-words">${escapeHtml(msg.content)}</p>
                            <div class="flex items-center mt-2">
                                <span class="text-[8px] font-extrabold uppercase tracking-widest text-${accentColor}-400/70">
                                    ${isSystem ? 'System Broadcast' : 'Teacher Message'}
                                </span>
                                <span class="mx-2 text-muted opacity-30 text-[8px]">•</span>
                                <span class="text-[8px] text-muted">${new Date(msg.timestamp).toLocaleDateString()}</span>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // --- Initialization ---

        document.addEventListener('DOMContentLoaded', async () => {
            // 1. Load data and set theme
            await loadDB();
            await seedDB();
            setTheme(getTheme()); // Apply saved theme immediately

            // 2. Export global functions
            window.handleLogin = handleLogin;
            window.handleLogout = handleLogout;
            window.startExam = startExam;
            window.updateAnswer = updateAnswer;
            window.submitExam = submitExam;
            window.showConfirmSubmitModal = showConfirmSubmitModal;
            window.navigateToQuestion = navigateToQuestion;
            window.setState = setState;
            window.toggleTheme = toggleTheme;
            window.enterFullScreen = enterFullScreen;
            window.handleFullScreenChange = handleFullScreenChange;
            window.handleVisibilityChange = handleVisibilityChange;
            window.startExamDOMDependencies = startExamDOMDependencies;
            window.reAttachCamera = reAttachCamera;
            window.proceedToExam = proceedToExam;
            window.toggleInstructionsAccept = toggleInstructionsAccept;

            // Admin Functions
            window.handleEditTest = handleEditTest;
            window.handleDeleteTest = handleDeleteTest;
            window.handleSaveQuestion = handleSaveQuestion;
            window.handleDeleteQuestion = handleDeleteQuestion;
            window.handleAssignmentToggle = handleAssignmentToggle;
            window.showSnapshotsModal = showSnapshotsModal;
            window.renderCreateStudentAndAssignModal = renderCreateStudentAndAssignModal;
            window.handleCreateStudentAndAssign = handleCreateStudentAndAssign;
            window.handleDeleteStudent = handleDeleteStudent;
            window.handleRegistration = handleRegistration;
            window.handleProfileUpdate = handleProfileUpdate;
            window.renderEditStudentModal = renderEditStudentModal;
            window.handleEditStudent = handleEditStudent;
            window.handleCreateAdmin = handleCreateAdmin;
            window.handleDeleteAdmin = handleDeleteAdmin;
            window.filterStudentList = filterStudentList;
            window.filterTestList = filterTestList;
            window.filterAdminList = filterAdminList;
            window.showGeminiModal = showGeminiModal;
            window.handleSendMessage = handleSendMessage;
            window.toggleMessages = toggleMessages;
            window.switchLoginTab = function (role) {
                // Hide all forms
                ['student', 'admin', 'superadmin'].forEach(r => {
                    const form = document.getElementById(`form-${r}`);
                    const tab = document.getElementById(`tab-${r}`);
                    if (form && tab) {
                        if (r === role) {
                            // Show active form
                            form.classList.remove('opacity-0', 'translate-x-8', 'pointer-events-none', 'z-0');
                            form.classList.add('opacity-100', 'translate-x-0', 'z-10');

                            // Activate tab
                            tab.classList.remove('text-gray-400', 'hover:text-white', 'hover:bg-white/5');
                            if (r === 'student') tab.classList.add('bg-accent-1', 'text-white', 'shadow-lg');
                            if (r === 'admin') tab.classList.add('bg-red-600', 'text-white', 'shadow-lg');
                            if (r === 'superadmin') tab.classList.add('bg-purple-600', 'text-white', 'shadow-lg');
                        } else {
                            // Hide inactive form
                            form.classList.remove('opacity-100', 'translate-x-0', 'z-10');
                            form.classList.add('opacity-0', 'translate-x-8', 'pointer-events-none', 'z-0');

                            // Deactivate tab
                            tab.classList.remove('bg-accent-1', 'bg-red-600', 'bg-purple-600', 'text-white', 'shadow-lg');
                            tab.classList.add('text-gray-400', 'hover:text-white', 'hover:bg-white/5');
                        }
                    }
                });
            };

            renderApp();
        });

    </script>
</body>

</html>
