<!doctype html>
<html lang="en" class="dark">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Exammiee</title>
    <meta name="description"
        content="Exammiee: Role-based access control (Admin/Student), proctoring snapshots, test assignment, and management tools. Includes support for Multiple Choice (MCQ) and Multiple Select (MSQ) questions, and advanced tab-switching detection." />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // Enable dark mode based on the 'dark' class on the HTML tag
            theme: {
                extend: {
                    colors: {
                        // Dark Mode Variables
                        'bg-900': 'var(--bg-900)',
                        'bg-800': 'var(--bg-800)',
                        'bg-card': 'var(--bg-card)',
                        'glass': 'var(--glass)',
                        'muted': 'var(--muted)',
                        'accent-1': 'var(--accent-1)', // Primary accent color (Purple/Blue)
                        'accent-2': 'var(--accent-2)', // Secondary accent color (Cyan)

                        // Light Mode Fallback/Config (Used only if 'dark' class is absent)
                        'light-bg-900': '#f5f7f9',
                        'light-bg-800': '#ffffff',
                        'light-muted': '#5c6d83',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* ==========================
       Exammiee — Doon University Theme
       ========================== */

        /* Dark Mode (Default) - Premium Slate & Navy */
        :root.dark {
            --bg-900: #0f172a;
            /* Slate 900 */
            --bg-800: #1e293b;
            /* Slate 800 */
            --bg-card: rgba(30, 41, 59, 0.7);
            /* Translucent Slate 800 for Glassmorphism */
            --text-main: #f8fafc;
            /* Slate 50 */
            --text-muted: #94a3b8;
            /* Slate 400 */
            --glass: rgba(255, 255, 255, 0.08);
            --accent-1: #3b82f6;
            /* Elegant Blue */
            --accent-2: #f59e0b;
            /* Amber/Gold */
        }

        /* Light Mode - Clean Academic White & Gray */
        :root {
            --bg-900: #f8fafc;
            /* Slate 50 */
            --bg-800: #f1f5f9;
            /* Slate 100 */
            --bg-card: rgba(255, 255, 255, 0.8);
            --text-main: #0f172a;
            /* Slate 900 */
            --text-muted: #64748b;
            /* Slate 500 */
            --glass: rgba(0, 0, 0, 0.05);
            --accent-1: #2563eb;
            /* Deep Blue */
            --accent-2: #d97706;
            /* Deep Gold */
        }

        /* ==========================
       Global Styles
       ========================== */
        body {
            background-color: var(--bg-900);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(245, 158, 11, 0.15), transparent 25%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* FIX 1: Prevent body scrolling during exam mode */
        body.exam-mode,
        body.exam-mode * {
            overflow: hidden !important;
            /* Prevent text selection / copy during exam */
            -webkit-user-select: none !important;
            -moz-user-select: none !important;
            -ms-user-select: none !important;
            user-select: none !important;
            -webkit-touch-callout: none !important;
        }

        /* Re-allow overflow scrolling on specific exam containers */
        body.exam-mode #app,
        body.exam-mode .exam-sidebar,
        body.exam-mode .lg\:col-span-3 {
            overflow: auto !important;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Text Colors */
        .text-muted {
            color: var(--text-muted) !important;
        }

        .text-accent-1 {
            color: var(--accent-1) !important;
        }

        .text-accent-2 {
            color: var(--accent-2) !important;
        }

        .text-white {
            color: var(--text-main) !important;
        }


        /* Primary Button */
        .btn-primary {
            background: var(--accent-1);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 10px rgba(124, 92, 255, 0.3);
        }

        .btn-primary:hover {
            background: var(--accent-2);
            /* Use secondary accent on hover for primary */
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 212, 255, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
            box-shadow: 0 2px 5px var(--accent-1);
        }

        /* Navigation Card Tilt Effect */
        .nav-card:hover {
            transform: perspective(1000px) rotateX(1deg) rotateY(1deg) scale(1.02);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.2);
        }

        /* Input Fields */
        .input-field {
            background: var(--glass);
            border: 1px solid var(--accent-2);
            color: var(--text-main);
            padding: 10px 15px;
            border-radius: 8px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent-1);
            box-shadow: 0 0 0 3px var(--accent-1);
        }

        /* Fix for select options text visibility */
        select.input-field option {
            background-color: var(--bg-800);
            color: var(--text-main);
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .slide-up {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            /* Initial state before animation */
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .scale-in {
            animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Animation Delays for stagger effects */
        .delay-100 {
            animation-delay: 100ms;
        }

        .delay-200 {
            animation-delay: 200ms;
        }

        .delay-300 {
            animation-delay: 300ms;
        }

        /* Proctoring Warning Pulse */
        .pulse-red {
            animation: pulseRed 1s infinite;
        }

        @keyframes pulseRed {

            0%,
            100% {
                background-color: #ef4444;
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            }

            70% {
                background-color: #b91c1c;
                box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
            }
        }

        /* Custom Login Page Styling with Animation */
        .login-container {
            background-color: var(--bg-card);
            border: 1px solid var(--glass);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* Animated Mesh Background for Login */
        .animated-mesh-bg {
            background: linear-gradient(45deg, var(--bg-900), var(--bg-800), #1e3a8a, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            position: relative;
        }

        .animated-mesh-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at top left, rgba(59, 130, 246, 0.3), transparent 50%),
                radial-gradient(circle at bottom right, rgba(245, 158, 11, 0.2), transparent 50%);
            mix-blend-mode: screen;
            animation: pulseGlow 8s ease-in-out infinite alternate;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes pulseGlow {
            0% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        /* NEW: Exam Sidebar Styling */
        .exam-sidebar {
            /* Make it sticky and scrollable */
            position: sticky;
            top: 1rem;
            /* Space from the top */
            max-height: calc(100vh - 2rem);
            overflow-y: auto;
        }

        .question-nav-item {
            /* Base button style */
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
            border: 1px solid transparent;
        }

        .question-nav-item.answered {
            background-color: #10b98140;
            /* Tailwind green-500/25 */
            color: #10b981;
            /* Tailwind green-500 */
            border-color: #10b98180;
        }

        .question-nav-item.pending {
            background-color: #9ca3af10;
            /* Tailwind gray-400/10 */
            color: var(--text-muted);
            border-color: var(--glass);
        }

        .question-nav-item:hover {
            background-color: var(--glass);
        }

        .question-nav-item.current {
            border-color: var(--accent-2) !important;
            background-color: var(--accent-2) !important;
            color: white !important;
            box-shadow: 0 0 0 3px var(--accent-2)50;
        }

        /* Admin Table Styling */
        .admin-table-row:hover {
            background-color: var(--glass);
        }
    </style>
</head>

<body>

    <div id="app" class="w-full max-w-7xl mx-auto p-4 md:p-8">
    </div>

    <div id="modal-container">
    </div>

    <canvas id="snapshot-canvas" style="display:none;"></canvas>

    <script type="text/javascript">
        // Constants and Global State
        const APP_STATE = {
            LOGIN: 'login',
            STUDENT_DASHBOARD: 'student_dashboard',
            STUDENT_PROFILE: 'student_profile',
            ADMIN_DASHBOARD: 'admin_dashboard',
            ADMIN_MANAGE_TESTS: 'admin_manage_tests',
            ADMIN_MANAGE_STUDENTS: 'admin_manage_students',
            ADMIN_MANAGE_ASSIGNMENTS: 'admin_manage_assignments',
            ADMIN_VIEW_RESULTS: 'admin_view_results',
            SUPERADMIN_DASHBOARD: 'superadmin_dashboard',
            SUPERADMIN_MANAGE_ADMINS: 'superadmin_manage_admins',
            SUPERADMIN_ACTIVITY_LOG: 'superadmin_activity_log',
            SUPERADMIN_SYSTEM_SETTINGS: 'superadmin_system_settings',
            EXAM_INSTRUCTIONS: 'exam_instructions',
            EXAM: 'exam',
            ERROR: 'error'
        };

        let state = {
            appState: APP_STATE.LOGIN,
            currentUser: null,
            currentExam: null,
            currentQuestionView: 1,
            editTestId: null,
            editQuestionIndex: -1,
            editQuestionType: null,
            calculatedStats: null,
            systemAnnouncement: '',
            messages: [],
            isMessagePanelOpen: false
        };

        let DB = {
            admins: {},
            students: {},
            tests: [],
            results: {},
            assignments: {},
            admin: null,
            messages: [],
            logs: [] // NEW: Activity Logs
        };

        async function logEvent(type, userId, details = '') {
            const timestamp = new Date().toISOString();
            const logEntry = { timestamp, type, userId, details };
            DB.logs.unshift(logEntry);
            if (DB.logs.length > 200) DB.logs.pop(); // Keep last 200 logs
            await saveDB(true); // Silent save
        }


        // --- DB Management ---
        const DB_KEY = 'exammiee_db_v4';
        const THEME_KEY = 'exammiee_theme';

        async function loadDB() {
            try {
                const response = await fetch('/api/sync');
                if (response.ok) {
                    const loadedDB = await response.json();
                    DB.superadmin = loadedDB.superadmin || null;
                    DB.admin = loadedDB.admin || { id: 'admin', name: 'Administrator' };
                    DB.admins = loadedDB.admins || {};
                    DB.students = loadedDB.students || {};
                    DB.tests = loadedDB.tests || [];
                    DB.assignments = loadedDB.assignments || {};
                    DB.results = loadedDB.results || {};
                    console.log("DB loaded. Admins:", Object.keys(DB.admins).length);
                } else {
                    console.error("Failed to fetch DB from backend, falling back to empty.");
                }
            } catch (e) {
                console.error("Error loading DB from backend:", e);
            }
        }

        async function saveDB() {
            try {
                await fetch('/api/sync', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        superadmin: DB.superadmin,
                        admin: DB.admin,
                        admins: DB.admins,
                        students: DB.students,
                        tests: DB.tests,
                        assignments: DB.assignments,
                        results: DB.results
                    })
                });
            } catch (e) {
                console.error("Error saving DB to backend:", e);
            }
        }

        // --- Theme Logic ---
        function getTheme() {
            // Default to 'dark' if not set
            return localStorage.getItem(THEME_KEY) || 'dark';
        }

        function setTheme(theme) {
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
                localStorage.setItem(THEME_KEY, 'dark');
            } else {
                document.documentElement.classList.remove('dark');
                localStorage.setItem(THEME_KEY, 'light');
            }
        }

        function toggleTheme() {
            const currentTheme = getTheme();
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            setTheme(newTheme);
            renderApp(); // Re-render to update the toggle button state
        }
        // --- End Theme Logic ---


        // --- Seed Data (Initial Setup) ---
        async function seedDB() {
            if (Object.keys(DB.students).length === 0) {
                DB.students['demo'] = {
                    pass: 'demo',
                    name: 'Demo Student'
                };
                DB.students['john'] = {
                    pass: 'pass123',
                    name: 'John Doe'
                };
                // Add an unassigned student for testing the new flow
                DB.students['newreg'] = {
                    pass: 'register',
                    name: 'New Registered Student'
                };
            }


            if (DB.tests.length === 0) {
                DB.tests.push({
                    id: 't_math',
                    title: 'Basic Math & Logic Test (MCQ/MSQ)',
                    duration: 3, // Short duration for quick testing
                    questions: [{
                        id: 'q1',
                        q: 'What is 5 multiplied by 8? (MCQ)',
                        options: {
                            A: '30',
                            B: '40',
                            C: '58',
                            D: '13'
                        },
                        correct: 'B',
                        marks: 1,
                        type: 'mcq' // Default to MCQ
                    }, {
                        id: 'q2',
                        q: 'If x + 3 = 10, what is x? (MCQ)',
                        options: {
                            A: '7',
                            B: '3',
                            C: '13',
                            D: '0'
                        },
                        correct: 'A',
                        marks: 1,
                        type: 'mcq'
                    }, {
                        id: 'q3',
                        q: 'Which of the following numbers are odd and prime (between 1 and 10)? (Select all that apply)',
                        options: {
                            A: '2',
                            B: '3',
                            C: '5',
                            D: '7'
                        },
                        correct: ['B', 'C', 'D'], // MSQ - Multiple correct answers
                        marks: 2, // Higher marks for MSQ
                        type: 'msq' // Set type to MSQ
                    },
                    {
                        id: 'q4',
                        q: 'What are the next two numbers in the sequence: 1, 1, 2, 3, 5, 8, ... (MSQ)',
                        options: {
                            A: '11',
                            B: '12',
                            C: '13',
                            D: '21'
                        },
                        correct: ['C', 'D'], // MSQ - Multiple correct answers
                        marks: 2,
                        type: 'msq'
                    }]
                });
                DB.tests.push({
                    id: 't_gk',
                    title: 'General Knowledge Quiz (MCQ)',
                    duration: 5,
                    questions: [{
                        id: 'q5',
                        q: 'Capital of Japan? (MCQ)',
                        options: {
                            A: 'Beijing',
                            B: 'Seoul',
                            C: 'Tokyo',
                            D: 'Bangkok'
                        },
                        correct: 'C',
                        marks: 1,
                        type: 'mcq'
                    },
                    {
                        id: 'q6',
                        q: 'Which planets are gas giants? (MSQ)',
                        options: {
                            A: 'Earth',
                            B: 'Jupiter',
                            C: 'Saturn',
                            D: 'Mars'
                        },
                        correct: ['B', 'C'],
                        marks: 2,
                        type: 'msq'
                    }]
                });
            }

            // Ensure all loaded/seeded questions have a type for backwards compatibility
            DB.tests.forEach(test => {
                test.questions.forEach(q => {
                    if (!q.type) {
                        // Infer type based on correct answer structure if missing
                        q.type = Array.isArray(q.correct) ? 'msq' : 'mcq';
                    }
                    // Ensure MSQ correct is an array, even if loaded as a string for safety
                    if (q.type === 'msq' && !Array.isArray(q.correct)) {
                        q.correct = q.correct ? [q.correct] : [];
                    }
                });
            });


            DB.assignments['demo'] = ['t_math', 't_gk'];
            DB.assignments['john'] = ['t_math'];
            // 'newreg' is intentionally unassigned to demonstrate the new feature

            await saveDB();
        }

        // --- Utility Functions ---
        function showModal(title, message, isError = false, buttons = []) {
            const modalContainer = document.getElementById('modal-container');
            const modal = document.createElement('div');
            modal.className = `fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-75 fade-in`;

            const defaultButton = {
                text: 'Close',
                class: 'btn-primary w-full',
                action: 'this.closest(\'.fixed\').remove()'
            };

            const finalButtons = buttons.length > 0 ? buttons : [defaultButton];

            const buttonsHtml = finalButtons.map(btn => {
                const btnClass = btn.class || 'btn-primary w-full';
                return `<button onclick="${btn.action}" class="${btnClass}">${btn.text}</button>`;
            }).join('');

            modal.innerHTML = `
        <div class="card p-6 w-full max-w-sm ${isError ? 'border-red-500' : 'border-accent-1'} shadow-2xl">
          <h3 class="text-xl font-bold mb-2 ${isError ? 'text-red-400' : 'text-accent-2'}">${title}</h3>
          <p class="text-muted mb-4">${message}</p>
          <div class="space-y-3">${buttonsHtml}</div>
        </div>
      `;
            modalContainer.appendChild(modal);
        }

        // NEW: Function to show the registration modal
        function showRegisterModal() {
            const modalContainer = document.getElementById('modal-container');
            const modal = document.createElement('div');
            modal.className = `fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-75 fade-in`;

            // Get list of admins to populate dropdown
            let admins = Object.keys(DB.admins).map(id => ({ id, name: DB.admins[id].name }));

            // Ensure the default admin is included if not already in DB.admins
            if (DB.admin && !DB.admins[DB.admin.id]) {
                admins.unshift({ id: DB.admin.id, name: DB.admin.name || 'Administrator' });
            }

            // If still empty (should not happen), add a fallback
            if (admins.length === 0) {
                admins.push({ id: 'admin', name: 'Administrator' });
            }

            const adminOptions = admins.map(a => `<option value="${a.id}">${escapeHtml(a.name)} (${a.id})</option>`).join('');

            modal.innerHTML = `
            <div class="card p-6 w-full max-w-md shadow-2xl border-accent-2/50">
                <h3 class="text-2xl font-bold mb-4 text-accent-2">Student Registration</h3>
                <form id="register-form" onsubmit="handleRegistration(event)" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1 text-white" for="regName">Full Name</label>
                        <input id="regName" name="studentName" type="text" required class="input-field w-full">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 text-white" for="regId">Student ID (Unique Username)</label>
                        <input id="regId" name="studentId" type="text" required class="input-field w-full">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 text-white" for="regPass">Password</label>
                        <input id="regPass" name="studentPass" type="password" required class="input-field w-full">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 text-white" for="regAdmin">Select Your Teacher</label>
                        <select id="regAdmin" name="adminId" required class="input-field w-full">
                            <option value="">-- Choose a Teacher --</option>
                            ${adminOptions}
                        </select>
                    </div>
                    <button type="submit" class="btn-primary w-full bg-blue-600 hover:bg-blue-700">
                        <i class="fas fa-user-plus mr-2"></i> Complete Registration
                    </button>
                    <button type="button" onclick="this.closest('.fixed').remove()" class="btn-primary w-full bg-gray-600 hover:bg-gray-700">
                        Cancel
                    </button>
                </form>
            </div>
        `;
            modalContainer.appendChild(modal);
        }

        // NEW: Function for exam submission confirmation
        function showConfirmSubmitModal() {
            if (!state.currentExam) return;

            // Calculate the score to display in the confirmation
            const { score, maxScore } = calculateScore(state.currentExam);
            const answeredCount = Object.keys(state.examAnswers).filter(qid => {
                const ans = state.examAnswers[qid];
                return Array.isArray(ans) ? ans.length > 0 : ans !== null && ans !== undefined;
            }).length;

            const totalQuestions = state.currentExam.questions.length;
            const pendingCount = totalQuestions - answeredCount;

            showModal(
                'Confirm Submission',
                `You are about to submit the test "${state.currentExam.title}".
            <ul class="list-disc list-inside mt-2 space-y-1">
                <li class="text-white">Questions Answered: <strong class="text-green-400">${answeredCount} / ${totalQuestions}</strong></li>
                <li class="text-white">Questions Pending: <strong class="text-red-400">${pendingCount}</strong></li>
            </ul>
            Are you sure you want to finish the exam now?`,
                false,
                [
                    { text: 'Yes, Submit Now', class: 'btn-primary w-full bg-red-600 hover:bg-red-700', action: 'submitExam(); this.closest(\'.fixed\').remove();' },
                    { text: 'Cancel & Go Back', class: 'btn-primary w-full bg-gray-600 hover:bg-gray-700', action: 'this.closest(\'.fixed\').remove()' }
                ]
            );
        }


        function showSnapshotsModal(studentName, testTitle, snapshots) {
            const modalContainer = document.getElementById('modal-container');
            const modal = document.createElement('div');
            modal.className = `fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-75 fade-in`;

            // Safely map snapshots to HTML, or show a message if none
            const snapshotHtml = snapshots.length > 0 ? snapshots.map((base64, index) => {
                // Check if base64 is not empty/null before creating the img tag
                if (!base64 || typeof base64 !== 'string' || base64.length < 50) return '';
                return `
                <div class="p-2 border border-glass rounded-lg">
                    <p class="text-sm text-muted mb-1">Snapshot ${index + 1}/${snapshots.length}</p>
                    <img src="${base64}" alt="Proctoring Snapshot ${index + 1}" class="w-full h-auto rounded-md object-cover">
                </div>

            }).join('') : '<p class="text-muted">No proctoring snapshots were recorded for this test.</p>';

        function escapeHtml(s) {
            if (s === null || s === undefined) return '';
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        function generateId(prefix = 'id') {
            return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).substring(2, 5)}`;
        }

        function generateRandomId(name) {
            const sanitizedName = name.replace(/\s/g, '').toLowerCase().substring(0, 8);
            return `${sanitizedName || 'student'}${Math.random().toString(36).substring(2, 8)}`;
        }
        function generateRandomPass() {
            return Math.random().toString(36).substring(2, 14);
        }

        function renderError(message) {
            return `<div class="card p-8 text-center text-red-400 border-red-500/50 fade-in">
            <i class="fas fa-exclamation-triangle text-5xl mb-4"></i>

            <button onclick="handleLogout()" class="btn-primary mt-6 bg-red-600 hover:bg-red-700">Go to Login</button>
        </div>`;
        }

        // NEW UTILITY: Safely encode and decode snapshots for inline use in HTML
        function encodeSnapshots(snapshots) {
            // We use encodeURIComponent on the JSON string to safely pass it in the onclick attribute
            return encodeURIComponent(JSON.stringify(snapshots));
        }


        // --- State Management (Optimization) ---
        function setState(newState, overrides = {}, skipFade = false) {
            const oldAppState = state.appState;
            // Merge overrides into state
            state = { ...state, ...overrides };

            // Determine if it's an internal admin view switch (for smooth navigation)
            const isAdminApp = oldAppState.startsWith('admin_') || newState.startsWith('admin_');
            const isInternalAdminNav = isAdminApp && newState !== APP_STATE.ADMIN_DASHBOARD;

            state.appState = newState;
            renderApp(skipFade || isInternalAdminNav);
        }


        // --- UI/UX Upgrade: Full-screen & Tab-Switch Logic ---

        // NEW: Full-screen Exit Proctoring Logic
        function handleFullScreenChange() {
            const isFullScreen = document.fullscreenElement || document.webkitFullscreenElement;

            if (state.appState === APP_STATE.EXAM && !isFullScreen) {
                state.proctoringOffenseCount++;

                if (state.proctoringOffenseCount === 1) {
                    showModal(

                                text: 'Re-enter Full-Screen Now',

                        true,

                    );

        }

        // NEW PROCTORING UPGRADE: Off-Tab/Window Tracking
        function handleVisibilityChange() {
            if (state.appState !== APP_STATE.EXAM) {
                return;
            }

            if (document.visibilityState === 'hidden') {
                state.proctoringOffenseCount++;

                if (state.proctoringOffenseCount === 1) {

                    );
                } else if (state.proctoringOffenseCount === 2) {

                        'PROCTORING ALERT: Tab Switch Detected (2nd Offense)',

                        true,
                        []
                    );
                } else if (state.proctoringOffenseCount >= 3) {

                        'Multiple proctoring offenses detected (3 strikes). The exam has been automatically submitted to maintain integrity.',
                        true,
                        []
                    );
                    submitExam(true);
                }
            } else {
                // User returned to the tab
                // 👇 FIX: Re-attach the camera stream immediately when the tab becomes visible on mobile.

        function enterFullScreen() {

                docEl.requestFullscreen().catch(err => {

        // --- End UI/UX Upgrade: Full-screen & Tab-Switch Logic ---


        // NEW FIX: Re-attach camera stream to the new video element after a silent re-render
        function reAttachCamera() {
            const videoEl = document.getElementById('webcam-feed');
            if (videoEl && state.cameraStream && videoEl.srcObject !== state.cameraStream) {
                videoEl.srcObject = state.cameraStream;
                console.log("Webcam stream re-attached.");
            } else if (!videoEl && state.cameraStream) {
                console.error("Webcam video element missing after re-render.");
            }
        }


        // --- Authentication ---
        async function handleLogin(e) {
            e.preventDefault();
            const form = e.target;
            const role = form.dataset.role;
            const id = form.id.value.toLowerCase().trim();
            const pass = form.pass.value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, pass, role })
                });
                const data = await res.json();

                if (data.success) {
                    state.currentUser = {
                        id: data.user.id,
                        name: data.user.name,
                        role: data.user.role
                    };

                    if (role === 'superadmin') {
                        setState(APP_STATE.SUPERADMIN_DASHBOARD);
                    } else if (role === 'admin') {
                        calculateAdminStats();
                        setState(APP_STATE.ADMIN_DASHBOARD);
                    } else {
                        setState(APP_STATE.STUDENT_DASHBOARD);
                    }
                } else {
                    showModal('Login Failed', data.message || 'Invalid ID or Password.', true);
                }
            } catch (err) {
                console.error('Login error:', err);
                showModal('Login Error', 'Unable to connect to the server.', true);
            }
        }

        // NEW: Handle Student Self-Registration
        async function handleRegistration(e) {
            e.preventDefault();
            const form = e.target;
            const name = form.studentName.value.trim();
            const id = form.studentId.value.toLowerCase().trim();
            const pass = form.studentPass.value;
            const admin_id = form.adminId.value;
            const modal = form.closest('.fixed');

            if (!name || !id || !pass || !admin_id) {
                showModal('Registration Failed', 'All fields including teacher selection are required.', true);

            }

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, name, pass, admin_id })
                });
                const data = await res.json();

                if (data.success) {
                    if (modal) modal.remove(); // Close registration modal
                    showModal('Registration Complete', `Welcome, ${name}! Your account has been created. Your assigned teacher (${admin_id}) must now assign tests to you before you can start. Please log in.`);
                    await loadDB(); // Refresh local DB state to include new student
                    if (state.currentUser && state.currentUser.role === 'admin') {
                        calculateAdminStats();
                    }
                } else {
                    showModal('Registration Failed', data.message || 'ID already exists or error registering.', true);

                console.error('Registration error:', err);

        // NEW: Handle Student Profile Update (Name/Password)
        function handleProfileUpdate(e) {
            e.preventDefault();
            const form = e.target;
            const studentId = state.currentUser.id;
            const newName = form.profileName.value.trim();
            const newPass = form.profilePass.value;

            if (!studentId || !DB.students[studentId]) {
                showModal('Error', 'Current user not found.', true);
                return;
            }

            // Update DB
            DB.students[studentId].name = newName;
            if (newPass) { // Only update password if a new one is provided
                if (newPass.length < 6) {
                    showModal('Error', 'New password must be at least 6 characters long.', true);
                    return;
                }
                DB.students[studentId].pass = newPass;
            }

            // Update current session state
            state.currentUser.name = newName;

            saveDB();
            showModal('Success', 'Your profile details have been updated successfully.');
            setState(APP_STATE.STUDENT_DASHBOARD);
        }


        function handleLogout() {
            state.currentUser = null;
            state.currentExam = null;
            setState(APP_STATE.LOGIN);
            stopProctoring();
            clearInterval(state.timerInterval);
            // Ensure we exit full-screen on logout
            exitFullScreen();
        }


        // --- Proctoring Logic ---

        async function startCamera() {
            try {
                if (!state.cameraStream) {
                    state.cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    console.log("Webcam stream captured.");
                }

                // Camera must be attached to the video element every time it's created (during re-render)
                const videoEl = document.getElementById('webcam-feed');

                if (videoEl && state.cameraStream) {
                    videoEl.srcObject = state.cameraStream;
                    await new Promise(resolve => {
                        if (videoEl.readyState >= 2) {
                            return resolve();
                        }
                        const timeout = setTimeout(() => {
                            videoEl.removeEventListener('loadedmetadata', resolve);
                            resolve();
                        }, 500);
                        videoEl.onloadedmetadata = () => {
                            clearTimeout(timeout);
                            resolve();
                        };
                    });
                    console.log("Webcam stream active and attached to element.");

                    try {
                        console.log("Loading face detection models...");
                        await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
                        console.log("Face detection models loaded.");
                    } catch (e) {
                        console.error("Failed to load face detection models", e);
                    }

                    return true;
                }
                return false;
            } catch (err) {
                console.error("Error accessing webcam:", err);
                if (state.appState === APP_STATE.EXAM) {
                    showModal('Webcam Error', 'Could not access your camera. Proctoring snapshots will not be taken.', true);
                }
                if (state.cameraStream) stopCamera();
                state.cameraStream = null;
                return false;
            }
        }

        function stopCamera() {
            if (state.cameraStream) {
                state.cameraStream.getTracks().forEach(track => track.stop());
                state.cameraStream = null;
                console.log("Webcam stream stopped.");
            }
        }

        function startProctoring(durationMinutes) {
            // Only attach listeners and start services if an exam is active
            if (state.appState !== APP_STATE.EXAM || !state.currentExam) return;

            // 1. Enter Full-Screen
            enterFullScreen();

            // 2. Add full-screen and visibility listeners
            document.addEventListener('visibilitychange', handleVisibilityChange);
            document.addEventListener('fullscreenchange', handleFullScreenChange);
            document.addEventListener('webkitfullscreenchange', handleFullScreenChange); // For Safari

            // 3. Set body class for exam mode (e.g., prevent overflow scroll, disable text selection)
            document.body.classList.add('exam-mode');

            // 4. Anti-cheat: Block copy, cut, paste, right-click, and devtools shortcuts
            document.addEventListener('copy', handleBlockCopy);
            document.addEventListener('cut', handleBlockCopy);
            document.addEventListener('paste', handleBlockCopy);
            document.addEventListener('contextmenu', handleBlockContextMenu);
            document.addEventListener('keydown', handleBlockKeyboard);

            // 5. Start Camera and Snapshots
            startCamera().then(isCameraActive => {
                if (isCameraActive) {
                    startSnapshotCycle(durationMinutes);
                }
            });
        }

        function startSnapshotCycle(durationMinutes) {
            if (!state.cameraStream) return;

            // Take 5 snapshots evenly spaced over the exam duration
            const totalSnapshots = 5;
            const totalDurationMs = durationMinutes * 60 * 1000;
            // Wait at least 15 seconds before the first snapshot to let student settle
            const minInitialDelayMs = 15000;

            // Calculate the time slot for each snapshot
            // We will take totalSnapshots - 1 snapshots evenly *after* the initial one.
            const effectiveDuration = totalDurationMs - minInitialDelayMs;
            const intervalMs = effectiveDuration / (totalSnapshots - 1);

            console.log(`Starting snapshot cycle. Initial delay: ${minInitialDelayMs / 1000}s. Interval: ${intervalMs / 1000}s`);


            const setNextSnapshot = (index = 0) => {
                if (state.appState !== APP_STATE.EXAM) {
                    console.log("Proctoring stopped: Exam state exited.");
                    return;
                }

                if (index >= totalSnapshots) {
                    console.log("Proctoring cycle complete.");
                    return;
                }

                // Calculate the delay for the next snapshot
                let nextDelayMs;
                if (index === 0) {
                    nextDelayMs = minInitialDelayMs; // First snapshot is after min initial delay
                } else {
                    // Subsequent snapshots are taken at the calculated interval
                    nextDelayMs = intervalMs;
                }

                console.log(`Snapshot ${index + 1} scheduled in ${Math.round(nextDelayMs / 1000)}s`);

                state.snapshotInterval = setTimeout(() => {
                    // Ensure the timer hasn't expired before taking the snapshot
                    if (Date.now() < state.examStartTime + totalDurationMs) {
                        takeSnapshot();
                    } else {
                        console.log("Snapshot skipped: Time expired.");
                    }

                    // Schedule the next one, regardless of whether we succeeded in taking this one
                    setNextSnapshot(index + 1);
                }, nextDelayMs);
            };

            setNextSnapshot(); // Start the first cycle
        }



        // Anti-cheat: Block copy, cut, paste, and right-click during exam
        function handleBlockCopy(e) { e.preventDefault(); }
        function handleBlockContextMenu(e) { e.preventDefault(); }
        function handleBlockKeyboard(e) {
            // Block Ctrl+C, Ctrl+V, Ctrl+X, Ctrl+A, Ctrl+U (view source), Ctrl+S, Ctrl+P, F12
            if (e.ctrlKey && ['c','v','x','a','u','s','p'].includes(e.key.toLowerCase())) {
                e.preventDefault();
            }
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['i','j','c'].includes(e.key.toLowerCase()))) {
                e.preventDefault();
            }
        }

        function stopProctoring() {
            stopCamera();
            clearTimeout(state.snapshotInterval);
            state.snapshotInterval = null;
            document.removeEventListener('visibilitychange', handleVisibilityChange);
            document.removeEventListener('fullscreenchange', handleFullScreenChange);
            document.removeEventListener('webkitfullscreenchange', handleFullScreenChange);
            // Remove anti-cheat listeners
            document.removeEventListener('copy', handleBlockCopy);
            document.removeEventListener('cut', handleBlockCopy);
            document.removeEventListener('paste', handleBlockCopy);
            document.removeEventListener('contextmenu', handleBlockContextMenu);
            document.removeEventListener('keydown', handleBlockKeyboard);
            document.body.classList.remove('exam-mode');
        }

        function takeSnapshot() {
            const video = document.getElementById('webcam-feed');
            const canvas = document.getElementById('snapshot-canvas');
            if (!video || !canvas || !state.cameraStream) {
                console.warn("Cannot take snapshot: Video or Canvas element missing, or camera not running.");
                return false;
            }

            // 💥 ULTIMATE MOBILE FIX START: Force the frame to update before capture 💥
            // 1. FORCE PLAY: This is crucial for mobile (especially iOS) where the browser pauses
            //    video rendering to save power, resulting in a black frame capture.
            if (video.paused || video.ended || video.readyState < 3) {
                video.play().catch(e => {
                    // Ignore play errors (e.g., if user interaction is required), but log them
                    console.warn("Attempt to force video play failed before snapshot:", e.name);
                });
            }

            // 2. ROBUST CHECK: Check for ready state (at least HAVE_CURRENT_DATA = 2) AND valid dimensions.
            if (video.readyState < 2 || video.videoWidth === 0 || video.videoHeight === 0) {
                console.warn(`Snapshot skipped: Video not ready (readyState: ${video.readyState}) or dimensions are zero. Mobile frame likely frozen.`);
                return false;
            }
            // 💥 ULTIMATE MOBILE FIX END 💥

            // Set canvas size to match the video feed
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Convert the image data to a base64 encoded string
            const dataUrl = canvas.toDataURL('image/jpeg', 0.8);

            // Store the snapshot in the current exam state
            if (state.currentExam) {
                if (!state.currentExam.snapshots) {
                    state.currentExam.snapshots = [];
                }
                state.currentExam.snapshots.push(dataUrl);
                console.log(`Snapshot taken and stored. Total: ${state.currentExam.snapshots.length}`);

                // Trigger a red pulse animation for a brief moment in the timer area
                const timerEl = document.getElementById('exam-timer');
                if (timerEl) {
                    timerEl.classList.add('pulse-red');
                    setTimeout(() => {
                        timerEl.classList.remove('pulse-red');
                    }, 500);
                }
                return true;
            }
            return false;
        }

        // --- Exam Logic ---

        function startExam(testId) {
            const test = DB.tests.find(t => t.id === testId);
            if (!test) {
                showModal('Error', 'Test not found.', true);
                return;
            }

            // Deep copy the test object to allow modifications (e.g., adding snapshots)
            state.currentExam = JSON.parse(JSON.stringify(test));
            state.examAnswers = {};
            state.currentQuestionView = 1;
            state.proctoringOffenseCount = 0;

            // Show instructions first instead of jumping directly to exam
            setState(APP_STATE.EXAM_INSTRUCTIONS);
        }

        // Called when student accepts instructions and proceeds
        function proceedToExam() {
            if (!state.currentExam) return;
            state.examStartTime = Date.now();
            // Enter full-screen immediately from the button click (user gesture context)
            enterFullScreen();
            setState(APP_STATE.EXAM);
            // Important: startExamDOMDependencies will be called right after the DOM is rendered
        }

        // Call this after the Exam DOM is rendered
        function startExamDOMDependencies() {
            if (state.appState !== APP_STATE.EXAM || !state.currentExam) return;

            startTimer(state.currentExam.duration);
            startProctoring(state.currentExam.duration);
        }

        function startTimer(durationMinutes) {
            clearInterval(state.timerInterval);
            const endTime = state.examStartTime + (durationMinutes * 60 * 1000);

            const updateTimer = () => {
                const remainingMs = endTime - Date.now();
                const timerEl = document.getElementById('exam-timer');

                if (remainingMs <= 0) {
                    clearInterval(state.timerInterval);
                    if (state.appState === APP_STATE.EXAM) {
                        showModal('Time Up!', 'Your exam time has expired and the test has been automatically submitted.', true);
                        submitExam(true); // Submit with isAutoSubmit = true
                    }
                    if (timerEl) timerEl.textContent = '00:00';
                    return;
                }

                const totalSeconds = Math.floor(remainingMs / 1000);
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                const minutesStr = String(minutes).padStart(2, '0');
                const secondsStr = String(seconds).padStart(2, '0');

                if (timerEl) {
                    timerEl.textContent = `${minutesStr}:${secondsStr}`;

                    // Highlight timer red when low on time
                    if (minutes < 1) { // Last minute
                        timerEl.classList.add('text-red-400');
                    } else if (minutes < 5) { // Last 5 minutes
                        timerEl.classList.add('text-yellow-400');
                    }
                }
            };

            state.timerInterval = setInterval(updateTimer, 1000);
            updateTimer(); // Call immediately to avoid 1-second delay
        }


        function calculateScore(test) {
            let score = 0;
            let maxScore = 0;

            test.questions.forEach(q => {
                maxScore += q.marks;
                const studentAnswer = state.examAnswers[q.id];

                if (q.type === 'mcq') {
                    if (studentAnswer && studentAnswer === q.correct) {
                        score += q.marks;
                    }
                } else if (q.type === 'msq') {
                    // MSQ logic: Requires ALL correct options to be selected and NO incorrect options
                    if (Array.isArray(studentAnswer) && studentAnswer.length === q.correct.length) {
                        // Check if student's selected options exactly match the correct options
                        const isCorrect = studentAnswer.every(ans => q.correct.includes(ans));
                        if (isCorrect) {
                            score += q.marks;
                        }
                    }
                }
            });

            return { score, maxScore };
        }


        function submitExam(isAutoSubmit = false) {
            if (!state.currentExam || !state.currentUser) return;

            // 1. Stop exam processes
            stopProctoring();
            clearInterval(state.timerInterval);

            const studentId = state.currentUser.id;
            const testId = state.currentExam.id;

            // 2. Calculate score and prepare result object
            const { score, maxScore } = calculateScore(state.currentExam);

            const result = {
                testTitle: state.currentExam.title,
                score: score,
                maxScore: maxScore,
                completionTime: Date.now(),
                answers: state.examAnswers,
                snapshots: state.currentExam.snapshots || [],
                fullScreenOffenses: state.proctoringOffenseCount || 0
            };

            // 3. Save to DB
            if (!DB.results[studentId]) {
                DB.results[studentId] = {};
            }
            DB.results[studentId][testId] = result;
            saveDB();

            // 4. Show result modal
            const showMarks = state.currentExam.show_marks !== false;
            const scoreDisplay = showMarks ? `<strong class="text-accent-2">${score} out of ${maxScore}</strong>` : `<span class="text-accent-1 italic">Hidden by Teacher</span>`;
            
            const message = isAutoSubmit 
                ? `The exam was automatically submitted due to a proctoring violation. ${showMarks ? `Your score is ${scoreDisplay}.` : 'Your results have been recorded.'}` 
                : `Test completed successfully! ${showMarks ? `Your final score is ${scoreDisplay}.` : 'Your results have been recorded and sent to your teacher.'}`;

            showModal(
                isAutoSubmit ? 'Exam Submitted' : 'Test Completed!',
                message,
                isAutoSubmit,
                [
                    { text: 'Go to Dashboard', class: 'btn-primary w-full', action: 'setState(APP_STATE.STUDENT_DASHBOARD); this.closest(\'.fixed\').remove();' }
                ]
            );

            // 5. Reset state and navigate
            state.currentExam = null;
            state.examAnswers = {};
            state.proctoringOffenseCount = 0;
            setState(APP_STATE.STUDENT_DASHBOARD, {}, true);
        }


        function updateAnswer(questionId, optionKey, type) {
            if (state.appState !== APP_STATE.EXAM) return;

            if (type === 'mcq') {
                // For MCQ, replace the answer
                state.examAnswers[questionId] = optionKey;
            } else if (type === 'msq') {
                // For MSQ, toggle the option in an array
                let currentAnswers = state.examAnswers[questionId] || [];
                const index = currentAnswers.indexOf(optionKey);

                if (index > -1) {
                    // Deselect
                    currentAnswers.splice(index, 1);
                } else {
                    // Select
                    currentAnswers.push(optionKey);
                }
                state.examAnswers[questionId] = currentAnswers;
            }

            // Silent re-render of just the sidebar to update question status

        // --- Admin Logic ---
        function calculateAdminStats() {
            const currentAdminId = state.currentUser.id;
            const isAdmin = state.currentUser.role === 'admin';

            const students = Object.keys(DB.students)
                .filter(id => !isAdmin || DB.students[id].admin_id === currentAdminId)
                .map(id => ({ id, ...DB.students[id] }));

            const totalStudents = students.length;
            const totalTests = DB.tests.length;

            // Calculate total assigned tests for THESE students
            const totalAssignments = students.reduce((sum, s) => sum + (DB.assignments[s.id] ? DB.assignments[s.id].length : 0), 0);

            let completedExams = 0;
            let totalOffenses = 0;

            students.forEach(s => {
                if (DB.results[s.id]) {
                    Object.keys(DB.results[s.id]).forEach(testId => {
                        completedExams++;
                        totalOffenses += (DB.results[s.id][testId].fullScreenOffenses || 0);
                    });
                }
            });

            state.calculatedStats = {
                totalStudents,
                totalTests,
                totalAssignments,
                completedExams,
                totalOffenses
            };
        }

        function handleEditTest(e) {
            e.preventDefault();
            const form = e.target;
            const testId = form.testId.value;
            const title = form.title.value.trim();
            const duration = parseInt(form.duration.value, 10);
            const showMarks = form.showMarks.checked;

            if (!title || isNaN(duration) || duration <= 0) {
                showModal('Error', 'Invalid title or duration.', true);
                return;
            }

            let test = DB.tests.find(t => t.id === testId);
            const isNew = state.editTestId === 'new';

            if (isNew) {
                // New test creation logic
                const newId = generateId('t');
                test = { id: newId, title, duration, show_marks: showMarks, questions: [] };
                DB.tests.push(test);
                state.editTestId = newId; // Update state to use the new ID
            } else if (test) {
                // Existing test update logic
                test.title = title;
                test.duration = duration;
                test.show_marks = showMarks;
            } else {
                showModal('Error', 'Test ID not found.', true);
                return;
            }

            saveDB();
            showModal('Success', `Test '${title}' saved successfully.`);
            setState(APP_STATE.ADMIN_MANAGE_TESTS, { editTestId: state.editTestId, editQuestionIndex: -1 }); // Re-render to show question editor
        }

        function handleDeleteTest(testId) {
            if (confirm(`Are you sure you want to delete test ID: ${testId}? This action cannot be undone and will affect all assignments and results related to this test.`)) {

                // Remove test
                DB.tests = DB.tests.filter(t => t.id !== testId);

                // Remove from assignments
                Object.keys(DB.assignments).forEach(studentId => {
                    DB.assignments[studentId] = DB.assignments[studentId].filter(id => id !== testId);
                });

                // Remove from results
                Object.keys(DB.results).forEach(studentId => {
                    if (DB.results[studentId][testId]) {
                        delete DB.results[studentId][testId];
                    }
                });

                saveDB();
                showModal('Success', 'Test and all related data deleted successfully.');
                setState(APP_STATE.ADMIN_MANAGE_TESTS, { editTestId: null, editQuestionIndex: -1 });
            }
        }


        function handleSaveQuestion(e) {
            e.preventDefault();
            const form = e.target;
            const test = DB.tests.find(t => t.id === state.editTestId);
            if (!test) return;

            const index = state.editQuestionIndex;
            const isNew = index === -1;
            const questionType = isNew ? state.editQuestionType : test.questions[index].type;

            const questionText = form.questionText.value.trim();
            const marks = parseInt(form.marks.value, 10);

            let options = {};
            let correct;

            // Collect all options
            ['A', 'B', 'C', 'D'].forEach(key => {
                options[key] = form[`option${key}`].value.trim();
            });

            if (questionType === 'mcq') {
                correct = form.correctMCQ.value;
            } else if (questionType === 'msq') {
                // Collect all selected checkboxes for MSQ
                correct = Array.from(form.querySelectorAll('input[name="correctMSQ"]:checked')).map(input => input.value);
                if (correct.length === 0) {
                    showModal('Error', 'MSQ must have at least one correct answer selected.', true);
                    return;
                }
            }

            if (!questionText || isNaN(marks) || marks <= 0) {
                showModal('Error', 'Invalid question text or marks.', true);
                return;
            }

            // Check for empty options (optional, but good practice)
            if (Object.values(options).some(opt => opt.length === 0)) {
                showModal('Warning', 'One or more options are empty. Please ensure all options are filled.', true);
                return;
            }

            const newQuestion = {
                id: isNew ? generateId('q') : test.questions[index].id,
                q: questionText,
                options: options,
                correct: correct,
                marks: marks,
                type: questionType
            };

            if (isNew) {
                test.questions.push(newQuestion);
            } else {
                test.questions[index] = newQuestion;
            }

            saveDB();
            showModal('Success', `Question ${isNew ? 'added' : 'updated'} successfully.`);

            // Return to the test editor view
            setState(APP_STATE.ADMIN_MANAGE_TESTS, { editQuestionIndex: -1, editQuestionType: null });
        }

        function handleDeleteQuestion(index) {
            const test = DB.tests.find(t => t.id === state.editTestId);
            if (!test) return;

            if (confirm(`Are you sure you want to delete Question ${index + 1}?`)) {
                test.questions.splice(index, 1);
                saveDB();
                showModal('Success', 'Question deleted successfully.');
                // Re-render the test details to refresh the question list
                setState(APP_STATE.ADMIN_MANAGE_TESTS, { editQuestionIndex: -1, editQuestionType: null });
            }
        }

            if (!DB.assignments[studentId]) {

    let pendingStudents = [];

    async function handleBulkFileSelect(input) {
        const file = input.files[0];
        if (!file) return;

        const display = document.getElementById('file-name-display');
        display.textContent = `Selected: ${file.name}`;
        display.classList.remove('hidden');

        const reader = new FileReader();
        const extension = file.name.split('.').pop().toLowerCase();

        try {
            if (extension === 'xlsx' || extension === 'xls' || extension === 'csv') {
                reader.onload = function(e) {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet);
                    processRawData(jsonData);
                };
                reader.readAsArrayBuffer(file);
            } else if (extension === 'docx') {
                reader.onload = async function(e) {
                    const arrayBuffer = e.target.result;
                    const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
                    const text = result.value;
                    const lines = text.split('\n').filter(l => l.trim().length > 0);
                    const jsonData = lines.map(line => {
                        // Try common delimiters: comma, colon, tab
                        const parts = line.split(/[,:\t]/);
                        if (parts.length >= 2) {
                            return {
                                Name: parts[0].trim(),
                                Password: parts[1].trim()
                            };
                        }
                        return null;
                    }).filter(x => x !== null);
                    processRawData(jsonData);
                };
                reader.readAsArrayBuffer(file);
            } else {
                showModal('Unsupported File', 'Please upload an Excel, CSV, or Word file.', true);
            }
        } catch (err) {
            console.error("Error parsing file:", err);
            showModal('Error', 'Failed to read the file. Please ensure it is not corrupted.', true);
        }
    }

    function processRawData(data) {
        pendingStudents = [];
        const tableBody = document.getElementById('preview-table-body');
        const previewContainer = document.getElementById('preview-container');
        tableBody.innerHTML = '';

        data.forEach(row => {
            // Support multiple header names
            const name = (row.Name || row.name || row.NAME || row['Full Name'] || '').toString().trim();
            const pass = (row.Password || row.password || row.PASSWORD || row.Pass || row.pass || '').toString().trim();

            if (name && pass) {
                const status = pass.length >= 6 ? '<span class="text-green-400">Valid</span>' : '<span class="text-red-400">Pass too short</span>';
                pendingStudents.push({ name, pass, isValid: pass.length >= 6 });

                const tr = document.createElement('tr');
                tr.className = 'hover:bg-glass/20';
                tr.innerHTML = `
                    <td class="p-2 text-white">${escapeHtml(name)}</td>
                    <td class="p-2 text-muted">${escapeHtml(pass)}</td>
                    <td class="p-2">${status}</td>
                `;
                tableBody.appendChild(tr);
            }
        });

        if (pendingStudents.length > 0) {
            previewContainer.classList.remove('hidden');
            document.getElementById('import-stats').textContent = `Found ${pendingStudents.length} students. ${pendingStudents.filter(s => s.isValid).length} ready to import.`;
            document.getElementById('start-import-btn').disabled = pendingStudents.filter(s => s.isValid).length === 0;
        } else {
            showModal('No Data Found', 'Could not find "Name" and "Password" columns in the file.', true);
        }
    }

    async function processBulkImport() {
        const validStudents = pendingStudents.filter(s => s.isValid);
        let createdCount = 0;
        let skippedCount = 0;
        let importedList = [];

        for (const s of validStudents) {
            const id = generateRandomId(s.name);
            if (!DB.students[id]) {
                DB.students[id] = { 
                    name: s.name, 
                    pass: s.pass, 
                    admin_id: state.currentUser.id 
                };
                DB.assignments[id] = [];
                importedList.push({ name: s.name, id: id, pass: s.pass });
                createdCount++;
            } else {
                skippedCount++;
            }
        }

        await saveDB();
        
        const modal = document.getElementById('modal-container').querySelector('.fixed');
        if (modal) modal.remove();

        const successMessage = `Successfully imported ${createdCount} students. ${skippedCount > 0 ? `${skippedCount} were skipped because of ID conflicts.` : ''}`;
        
        showModal('Import Complete', successMessage, false, [
            { 
                text: '<i class="fas fa-file-pdf mr-2"></i> Download Student Credentials PDF', 
                class: 'btn-primary w-full bg-red-600 hover:bg-red-700 mb-2', 
                action: `downloadStudentCredentialsPDF(${JSON.stringify(importedList).replace(/"/g, '&quot;')}); this.closest('.fixed').remove();` 
            },
            { 
                text: 'Close', 
                class: 'btn-primary w-full bg-gray-600 hover:bg-gray-700', 
                action: 'this.closest(\'.fixed\').remove()' 
            }
        ]);

        calculateAdminStats();
        setState(APP_STATE.ADMIN_MANAGE_STUDENTS);
    }

    function downloadStudentCredentialsPDF(students) {
        if (!students || students.length === 0) return;

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        // Add Title
        doc.setFontSize(18);
        doc.setTextColor(40);
        doc.text('Student Login Credentials', 14, 22);
        
        doc.setFontSize(11);
        doc.setTextColor(100);
        doc.text(`Generated on: ${new Date().toLocaleString()}`, 14, 30);
        doc.text(`Total Students: ${students.length}`, 14, 37);

        // Prepare table data
        const tableData = students.map(s => [s.name, s.id, s.pass]);

        doc.autoTable({
            startY: 45,
            head: [['Student Name', 'System ID / Username', 'Password']],
            body: tableData,
            theme: 'grid',
            headStyles: { fillColor: [59, 130, 246], textColor: [255, 255, 255] },
            alternateRowStyles: { fillColor: [245, 247, 250] },
            margin: { top: 45 }
        });

        doc.save(`student_credentials_${Date.now()}.pdf`);
    }
